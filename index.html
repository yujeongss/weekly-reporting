<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>주간업무보고</title>
  <script src="https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&display=swap');

    /* ===== CSS VARIABLES (2026 Indigo/Slate) ===== */
    :root {
      --accent: #4F46E5;
      --accent-dark: #3730A3;
      --accent-light: #EEF2FF;
      --accent-gradient: linear-gradient(135deg, #4F46E5 0%, #7C3AED 100%);
      --primary: #4F46E5;
      --primary-dark: #3730A3;
      --primary-light: #EEF2FF;
      --sidebar-bg: #FFFFFF;
      --sidebar-hover: #F5F3FF;
      --sidebar-active: #EEF2FF;
      --sidebar-text: #1E293B;
      --sidebar-border: #E2E8F0;
      --bg: #F8FAFF;
      --card-bg: #FFFFFF;
      --border: #E2E8F0;
      --border-light: #F1F5F9;
      --text: #1E293B;
      --text-muted: #94A3B8;
      --text-secondary: #64748B;
      --red: #EF4444;
      --red-light: #FEF2F2;
      --yellow: #F59E0B;
      --yellow-light: #FFFBEB;
      --green: #10B981;
      --green-light: #ECFDF5;
      --purple: #8B5CF6;
      --purple-light: #F5F3FF;
      --shadow-xs: 0 1px 2px rgba(15,23,42,0.04);
      --shadow-sm: 0 1px 3px rgba(15,23,42,0.04), 0 2px 8px rgba(15,23,42,0.04);
      --shadow-md: 0 2px 4px rgba(15,23,42,0.04), 0 6px 20px rgba(15,23,42,0.07);
      --shadow-lg: 0 4px 8px rgba(15,23,42,0.05), 0 16px 40px rgba(15,23,42,0.09);
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
    }

    /* ===== RESET ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Plus Jakarta Sans', 'Noto Sans KR', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      background-image:
        radial-gradient(ellipse 80% 50% at 20% -10%, rgba(79,70,229,0.06) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 110%, rgba(139,92,246,0.04) 0%, transparent 60%);
      color: var(--text);
      height: 100vh;
      display: flex;
      overflow: hidden;
      font-size: 14px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    /* ===== SIDEBAR ===== */
    #sidebar {
      width: 252px;
      flex-shrink: 0;
      background: var(--sidebar-bg);
      color: var(--sidebar-text);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      overflow-x: hidden;
      border-right: 1px solid var(--sidebar-border);
      box-shadow: 2px 0 12px rgba(15,23,42,0.04);
    }

    .sidebar-logo {
      padding: 18px 16px 16px;
      font-size: 14px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.3px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--accent-gradient);
      position: relative;
      overflow: hidden;
    }
    .sidebar-logo::after {
      content: '';
      position: absolute;
      top: -20px; right: -20px;
      width: 80px; height: 80px;
      background: rgba(255,255,255,0.08);
      border-radius: 50%;
      pointer-events: none;
    }
    .sidebar-logo-text { display: flex; flex-direction: column; gap: 1px; }
    .sidebar-team-name-wrap {
      display: flex; align-items: center; gap: 5px;
      cursor: pointer; font-size: 14px; font-weight: 700;
      border-radius: 4px;
      transition: opacity 0.15s;
    }
    .sidebar-team-name-wrap:hover { opacity: 0.82; }
    .sidebar-edit-icon { opacity: 0.55; flex-shrink: 0; transition: opacity 0.15s; }
    .sidebar-team-name-wrap:hover .sidebar-edit-icon { opacity: 1; }
    .sidebar-sub-label {
      font-size: 10px; font-weight: 500;
      opacity: 0.55; letter-spacing: 0.2px;
    }
    .sidebar-team-name-input {
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.4);
      border-radius: 6px;
      color: #fff; font-size: 13px; font-weight: 700;
      font-family: inherit; padding: 3px 8px;
      outline: none; width: 110px;
    }

    .sidebar-logo-icon {
      width: 28px;
      height: 28px;
      background: rgba(255,255,255,0.22);
      backdrop-filter: blur(4px);
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 800;
      color: #fff;
      flex-shrink: 0;
      border: 1px solid rgba(255,255,255,0.3);
    }

    .sidebar-period {
      padding: 12px 12px 8px;
      flex-shrink: 0;
    }
    .sidebar-period > label {
      font-size: 11px;
      color: var(--text-muted);
      display: block;
      margin-bottom: 5px;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }
    .period-display {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 10px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--bg);
      transition: all 0.15s ease;
    }
    .period-display:hover { background: var(--sidebar-hover); border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-light); }
    .period-edit-icon {
      font-size: 12px;
      color: var(--text-muted);
      margin-left: auto;
      transition: transform 0.15s;
    }
    .period-display:hover .period-edit-icon { transform: rotate(90deg); }
    @keyframes periodApplied {
      0%   { color: var(--green); }
      100% { color: var(--text); }
    }
    .period-display.applied { animation: periodApplied 1.2s ease forwards; }
    .period-inputs {
      display: none;
      flex-direction: column;
      gap: 6px;
      margin-top: 8px;
    }
    .period-inputs.show { display: flex; }
    .period-inputs select,
    .period-inputs input[type=number] {
      background: var(--card-bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 7px 10px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      width: 100%;
      outline: none;
      font-family: inherit;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .period-inputs select:focus,
    .period-inputs input[type=number]:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-light); }
    .period-apply-btn {
      padding: 8px 10px;
      background: var(--accent-gradient);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      width: 100%;
      transition: all 0.15s ease;
      font-family: inherit;
      letter-spacing: 0.2px;
    }
    .period-apply-btn:hover { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(79,70,229,0.3); }

    .sidebar-section-label {
      padding: 14px 16px 5px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
      flex-shrink: 0;
    }

    .sidebar-item {
      padding: 6px 10px 6px 12px;
      min-height: 36px;
      cursor: pointer;
      font-size: 13.5px;
      font-weight: 500;
      color: var(--sidebar-text);
      display: flex;
      flex-direction: column;
      justify-content: center;
      border-radius: var(--radius-sm);
      margin: 1px 8px;
      transition: all 0.15s ease;
      flex-shrink: 0;
    }
    .sidebar-item-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      gap: 4px;
    }
    .sidebar-item-name {
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .sidebar-done-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 17px;
      height: 17px;
      background: var(--green);
      color: #fff;
      border-radius: 50%;
      font-size: 10px;
      font-weight: 700;
      flex-shrink: 0;
      box-shadow: 0 2px 6px rgba(16,185,129,0.35);
    }
    .sidebar-item-time {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 1px;
    }
    .sidebar-item:hover { background: var(--sidebar-hover); color: var(--accent); }
    .sidebar-item.active {
      background: var(--sidebar-active);
      color: var(--accent);
      font-weight: 700;
      box-shadow: inset 3px 0 0 var(--accent);
    }
    .sidebar-item.disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    .member-delete-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 13px;
      line-height: 1;
      padding: 3px 5px;
      opacity: 0;
      border-radius: 6px;
      transition: opacity 0.15s, background 0.15s;
      flex-shrink: 0;
    }
    .sidebar-item:hover .member-delete-btn { opacity: 1; }
    .member-delete-btn:hover { background: var(--red-light); color: var(--red); opacity: 1; }

    .sidebar-badge {
      font-size: 10px;
      background: var(--accent-light);
      color: var(--accent);
      padding: 2px 7px;
      border-radius: 20px;
      font-weight: 600;
    }

    .sidebar-spacer { flex: 1; }

    .sidebar-footer {
      padding: 12px;
      border-top: 1px solid var(--border-light);
      flex-shrink: 0;
      background: var(--bg);
    }
    .export-btn {
      width: 100%;
      padding: 10px 14px;
      background: var(--accent-gradient);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-size: 13px;
      font-weight: 700;
      transition: all 0.15s ease;
      font-family: inherit;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      letter-spacing: 0.2px;
      box-shadow: 0 2px 8px rgba(79,70,229,0.25);
    }
    .export-btn:hover { opacity: 0.92; transform: translateY(-1px); box-shadow: 0 6px 16px rgba(79,70,229,0.35); }

    /* ===== CHAT PANEL ===== */
    /* AI 토글 FAB */
    @keyframes fabBounce {
      0%, 100% { transform: translateX(0); }
      40%       { transform: translateX(-8px); }
      65%       { transform: translateX(-3px); }
    }
    #chatFab {
      position: fixed;
      right: 0;
      top: 50%;
      margin-top: -44px;
      width: 52px;
      border-radius: 14px 0 0 14px;
      background: linear-gradient(160deg, #6D28D9, #4F46E5);
      border: none;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      padding: 14px 0;
      font-size: 24px;
      box-shadow: -4px 4px 20px rgba(79,70,229,0.35), -1px 0 0 rgba(255,255,255,0.1) inset;
      z-index: 300;
      animation: fabBounce 2.4s ease-in-out infinite;
      transition: opacity 0.2s, width 0.15s;
    }
    #chatFab .fab-label {
      font-size: 10px;
      font-weight: 700;
      color: rgba(255,255,255,0.9);
      letter-spacing: 0.5px;
      line-height: 1;
    }
    #chatFab:hover {
      animation: none;
      width: 60px;
      box-shadow: -6px 4px 28px rgba(79,70,229,0.5);
    }
    #chatFab.hidden { opacity: 0; pointer-events: none; animation: none; }

    #chatPanel {
      width: 0;
      flex-shrink: 0;
      overflow: hidden;
      background: #fff;
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      transition: width 0.22s cubic-bezier(.4,0,.2,1);
      box-shadow: -4px 0 16px rgba(0,0,0,0.06);
    }
    #chatPanel.open { width: 360px; }

    #chatPanel > * { min-width: 360px; }

    .chat-panel-header {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0;
    }
    .chat-panel-title { font-size: 14px; font-weight: 600; color: var(--text); }
    .chat-close-btn {
      background: none; border: none; cursor: pointer;
      font-size: 18px; color: var(--text-muted); line-height: 1;
      padding: 2px 6px; border-radius: 4px;
    }
    .chat-close-btn:hover { background: var(--sidebar-hover); }

    #chatMessages {
      flex: 1; overflow-y: auto;
      padding: 12px; display: flex; flex-direction: column; gap: 8px;
    }
    .chat-msg {
      max-width: 88%; padding: 8px 12px;
      border-radius: 12px; font-size: 13px; line-height: 1.55;
      word-break: break-word;
    }
    .chat-msg.user {
      align-self: flex-end;
      background: var(--accent); color: #fff;
      border-bottom-right-radius: 4px;
    }
    .chat-msg.assistant {
      align-self: flex-start;
      background: var(--border-light); color: var(--text);
      border-bottom-left-radius: 4px;
    }
    .chat-msg.error {
      align-self: flex-start;
      background: var(--red-light); color: var(--red);
      border-bottom-left-radius: 4px;
    }
    .chat-msg.chat-loading {
      align-self: flex-start;
      background: var(--border-light); color: var(--text-muted);
      font-style: italic;
    }

    .chat-tool-card {
      align-self: flex-start; width: 94%;
      border: 1px solid var(--border); border-radius: 10px;
      overflow: hidden; font-size: 13px;
      flex-shrink: 0;
    }
    .chat-tool-card.applied { opacity: 0.6; }
    .chat-tool-card.cancelled { opacity: 0.4; }
    .chat-tool-header {
      padding: 8px 12px;
      background: var(--yellow-light);
      font-size: 12px; font-weight: 600; color: var(--yellow);
      border-bottom: 1px solid var(--border);
    }
    .chat-tool-desc {
      padding: 8px 12px; color: var(--text);
      white-space: pre-wrap; line-height: 1.5; font-size: 12px;
    }
    .chat-tool-status {
      padding: 8px 12px; display: block;
      font-size: 12px; color: var(--text-muted);
    }
    .chat-tool-actions {
      padding: 8px 12px; display: flex; gap: 6px;
      border-top: 1px solid var(--border-light);
    }
    .chat-tool-apply-btn {
      padding: 5px 14px; background: var(--accent); color: #fff;
      border: none; border-radius: 5px; font-size: 12px;
      font-weight: 500; cursor: pointer;
    }
    .chat-tool-apply-btn:hover { background: var(--accent-dark); }
    .chat-tool-cancel-btn {
      padding: 5px 10px; background: var(--border); color: var(--text-secondary);
      border: none; border-radius: 5px; font-size: 12px; cursor: pointer;
    }
    .chat-tool-cancel-btn:hover { background: var(--sidebar-active); }

    .chat-input-area {
      padding: 10px; border-top: 1px solid var(--border);
      display: flex; gap: 6px; align-items: flex-end; flex-shrink: 0;
    }
    .chat-textarea {
      flex: 1; resize: none; padding: 9px 10px;
      border: 1px solid var(--border); border-radius: 8px;
      font-size: 13px; font-family: inherit; line-height: 1.4;
      outline: none; max-height: 120px;
    }
    .chat-textarea:focus { border-color: var(--accent); }
    .chat-send-btn {
      width: 38px;
      align-self: stretch;
      background: var(--accent); color: #fff;
      border: none; border-radius: 8px;
      cursor: pointer; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .chat-send-btn:hover { background: var(--accent-dark); }
    .chat-send-btn:disabled { background: var(--border); color: var(--text-muted); cursor: not-allowed; }

    /* ===== MAIN CONTENT ===== */
    #main {
      flex: 1;
      overflow-y: auto;
      padding: 28px 32px;
      min-width: 0;
    }

    .member-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
      padding: 20px 24px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-sm);
    }
    .member-header h1 {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: var(--text);
    }
    .member-header .period-tag {
      font-size: 13px;
      color: var(--text-muted);
      font-weight: 500;
      background: var(--bg);
      border: 1px solid var(--border);
      padding: 3px 10px;
      border-radius: 20px;
    }
    .member-status-bar {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .status-done-label {
      font-size: 13px;
      color: var(--green);
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .status-check-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 20px;
      height: 20px;
      background: var(--green);
      color: #fff;
      border-radius: 50%;
      font-size: 12px;
      font-weight: 700;
      flex-shrink: 0;
      box-shadow: 0 2px 6px rgba(16,185,129,0.35);
    }
    .content-body { }
    .content-locked .section {
      pointer-events: none;
      opacity: 0.55;
    }
    .status-btn {
      padding: 7px 16px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.15s ease;
      font-family: inherit;
    }
    .status-done-btn {
      background: var(--accent-gradient);
      color: #fff;
      box-shadow: 0 2px 8px rgba(79,70,229,0.25);
    }
    .status-done-btn:hover { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(79,70,229,0.35); }
    .status-edit-btn {
      background: var(--bg);
      color: var(--text-secondary);
      border: 1px solid var(--border);
    }
    .status-edit-btn:hover { background: var(--border-light); border-color: var(--text-muted); }
    .member-reset-btn {
      padding: 6px 12px;
      border-radius: var(--radius-sm);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid var(--border);
      background: none;
      color: var(--text-muted);
      transition: all 0.15s ease;
      font-family: inherit;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .member-reset-btn:hover { background: var(--red-light); color: var(--red); border-color: #FCA5A5; }
    .team-done-count {
      font-size: 13px;
      color: var(--text-secondary);
      font-weight: 500;
    }
    .team-done-count.all-done { color: var(--green); font-weight: 700; }

    /* ===== SECTION ===== */
    .section {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-sm);
      margin-bottom: 16px;
      overflow: hidden;
      transition: box-shadow 0.2s ease;
    }
    .section:hover { box-shadow: var(--shadow-md); }
    .section-header {
      padding: 14px 20px;
      background: linear-gradient(to right, #FAFBFF, var(--card-bg));
      border-bottom: 1px solid var(--border-light);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .section-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.1px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .add-btn {
      height: 30px;
      padding: 0 14px;
      background: var(--accent-gradient);
      color: #fff;
      border: none;
      border-radius: 20px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 700;
      transition: all 0.15s ease;
      font-family: inherit;
      box-shadow: 0 2px 6px rgba(79,70,229,0.2);
      letter-spacing: 0.2px;
    }
    .add-btn:hover { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 4px 10px rgba(79,70,229,0.3); }

    .empty-state {
      padding: 36px;
      text-align: center;
      color: var(--text-muted);
      font-size: 13.5px;
    }

    /* ===== TASK CARD ===== */
    .task-card {
      padding: 20px 24px;
      border-bottom: 1px solid var(--border-light);
      transition: background 0.15s ease;
    }
    .task-card:last-child { border-bottom: none; }
    .task-card:hover { background: #FAFBFF; }

    .task-meta {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 14px;
    }
    .task-kpi {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
      outline: none;
      border: 1px solid transparent;
      border-radius: var(--radius-sm);
      padding: 5px 8px;
      min-height: 32px;
      line-height: 1.5;
      width: 100%;
      box-sizing: border-box;
      background: transparent;
      letter-spacing: -0.3px;
      transition: all 0.15s ease;
    }
    .task-kpi:hover { border-color: var(--border); background: var(--bg); }
    .task-kpi:focus { outline: none; border-color: var(--accent); background: var(--accent-light); box-shadow: 0 0 0 3px rgba(79,70,229,0.12); }

    .task-fields {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 6px;
    }
    .field-group {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 4px 12px;
      height: 30px;
      transition: border-color 0.15s;
    }
    .field-group:focus-within { border-color: var(--accent); background: var(--accent-light); }
    .field-label {
      font-size: 12px;
      color: var(--text-secondary);
      white-space: nowrap;
      font-weight: 500;
    }
    .field-select,
    .field-input {
      height: 22px;
      padding: 0 4px;
      border: none;
      border-radius: 4px;
      font-size: 13px;
      background: transparent;
      color: var(--text);
      outline: none;
      font-family: inherit;
    }
    .field-input[type=number] { width: 52px; text-align: center; }
    .field-input[type=date] { min-width: 120px; }

    .task-meta-header {
      display: flex;
      align-items: flex-start;
      gap: 8px;
    }
    .task-meta-header .task-kpi { flex: 1; }

    .task-remove-btn {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 4px 10px;
      height: 28px;
      background: none;
      border: 1px solid transparent;
      border-radius: 20px;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      white-space: nowrap;
      opacity: 0;
      transition: opacity 0.15s, background 0.15s, border-color 0.15s, color 0.15s;
    }
    .task-card:hover .task-remove-btn,
    .deploy-card:hover .task-remove-btn { opacity: 1; }
    .task-remove-btn:hover { background: var(--red-light); color: var(--red); border-color: #FCA5A5; }

    .task-body {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }
    .activity-col {
      min-width: 0;
    }

    .activity-col h4 {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.9px;
      margin-bottom: 10px;
      padding: 5px 10px;
      border-radius: 6px;
      background: var(--bg);
      color: var(--text-secondary);
      display: inline-block;
    }
    .activity-col h4.current { background: var(--accent-light); color: var(--accent); }
    .activity-col h4.next { background: var(--purple-light); color: var(--purple); }

    .activity-item {
      display: flex;
      flex-direction: column;
      gap: 2px;
      margin-bottom: 6px;
    }
    .activity-main-row {
      display: flex;
      align-items: flex-start;
      gap: 6px;
    }
    .detail-items {
      display: flex;
      flex-direction: column;
      gap: 1px;
      margin-left: 20px;
      margin-top: 2px;
    }
    .detail-item {
      display: flex;
      align-items: flex-start;
      gap: 4px;
    }
    .detail-text {
      flex: 1;
      font-size: 13px;
      color: var(--text-secondary);
      border: 1px solid transparent;
      border-radius: 3px;
      padding: 2px 4px;
      min-height: 20px;
      line-height: 1.4;
      background: transparent;
      cursor: text;
    }
    .detail-prefix { color: var(--text-muted); font-size: 11px; flex-shrink: 0; padding-top: 3px; }
    .detail-text:hover { border-color: var(--border); background: var(--bg); }
    .detail-text:focus { outline: none; border-color: var(--accent); background: var(--accent-light); }
    .mini-add-detail-btn {
      height: 24px;
      padding: 0 9px;
      background: none;
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 11px;
      flex-shrink: 0;
      white-space: nowrap;
      font-family: inherit;
      font-weight: 600;
      transition: all 0.15s ease;
    }
    .mini-add-detail-btn:hover { color: var(--accent); border-color: var(--accent); background: var(--accent-light); }

    .progress-input-wrap {
      display: flex;
      align-items: center;
      gap: 3px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 0 6px;
      height: 26px;
      flex-shrink: 0;
    }
    .progress-input-wrap:focus-within { border-color: var(--accent); }
    .progress-wrap-label {
      font-size: 10px;
      color: var(--text-muted);
      white-space: nowrap;
      font-weight: 500;
    }
    .progress-input-wrap .progress-input {
      border: none;
      background: transparent;
      padding: 0;
      width: 42px;
      height: 20px;
    }
    .progress-input-wrap .progress-input:focus { border: none; }
    .activity-text {
      flex: 1;
      font-size: 14px;
      color: var(--text);
      outline: none;
      border: 1px solid transparent;
      border-radius: var(--radius-sm);
      padding: 5px 8px;
      min-height: 32px;
      line-height: 1.6;
      background: transparent;
      min-width: 0;
      transition: all 0.15s ease;
    }
    .activity-text:hover { border-color: var(--border); background: var(--bg); }
    .activity-text:focus { border-color: var(--accent); background: var(--accent-light); box-shadow: 0 0 0 3px rgba(79,70,229,0.1); }

    .progress-input {
      width: 52px;
      height: 26px;
      padding: 2px 4px;
      border: 1px solid var(--border);
      border-radius: 4px;
      font-size: 12px;
      text-align: center;
      outline: none;
      flex-shrink: 0;
      background: var(--bg);
      font-family: inherit;
    }
    .progress-input:focus { border-color: var(--accent); }

    .mini-remove-btn {
      padding: 0;
      background: none;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 11px;
      color: var(--text-muted);
      flex-shrink: 0;
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.12s, background 0.12s;
    }
    .activity-item:hover .mini-remove-btn,
    .detail-item:hover .mini-remove-btn,
    .op-item:hover .mini-remove-btn,
    .issue-item:hover .mini-remove-btn,
    .redmine-item:hover .mini-remove-btn { opacity: 1; }
    .mini-remove-btn:hover { background: var(--red-light); color: var(--red); }

    .add-item-btn {
      width: 100%;
      padding: 6px 10px;
      background: none;
      border: 1.5px dashed var(--border);
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 4px;
      min-height: 30px;
      font-family: inherit;
      transition: all 0.15s ease;
      text-align: left;
      font-weight: 500;
    }
    .add-item-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); border-style: solid; }

    /* Issues */
    .task-issues {
      margin-top: 16px;
      padding-top: 14px;
      border-top: 1px solid var(--border);
      grid-column: 1 / -1;
    }
    .issues-header {
      font-size: 12px;
      font-weight: 700;
      color: var(--red);
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 8px;
    }
    .issue-item {
      display: flex;
      align-items: flex-start;
      gap: 6px;
      margin-bottom: 4px;
    }
    .issue-text {
      flex: 1;
      font-size: 14px;
      color: var(--text);
      outline: none;
      border: 1px solid transparent;
      border-radius: 4px;
      padding: 3px 6px;
      min-height: 26px;
      line-height: 1.5;
      background: transparent;
    }
    .issue-text:hover { border-color: #fca5a5; background: var(--red-light); }
    .issue-text:focus { border-color: var(--red); background: var(--red-light); }

    /* ===== OPERATIONS SECTION ===== */
    .op-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 20px;
      min-height: 44px;
      border-bottom: 1px solid var(--border-light);
      transition: background 0.1s;
    }
    .op-item:last-child { border-bottom: none; }
    .op-item:hover { background: #FAFBFF; }

    .week-badge {
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      user-select: none;
      flex-shrink: 0;
      transition: all 0.15s ease;
      letter-spacing: 0.2px;
    }
    .week-badge.current { background: var(--accent-light); color: var(--accent); box-shadow: 0 1px 4px rgba(79,70,229,0.15); }
    .week-badge.next { background: var(--purple-light); color: var(--purple); box-shadow: 0 1px 4px rgba(139,92,246,0.15); }
    .week-badge:hover { transform: scale(1.05); }

    .op-text {
      flex: 1;
      font-size: 14px;
      color: var(--text);
      outline: none;
      border: 1px solid transparent;
      border-radius: 4px;
      padding: 3px 6px;
      min-height: 28px;
      line-height: 1.5;
      background: transparent;
    }
    .op-text:hover { border-color: var(--border); background: var(--bg); }
    .op-text:focus { border-color: var(--accent); background: var(--accent-light); }

    /* ===== DEPLOYMENT SECTION ===== */
    .deploy-card {
      padding: 18px 20px;
      border-bottom: 1px solid var(--border-light);
    }
    .deploy-card:last-child { border-bottom: none; }

    .deploy-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .deploy-product-name {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      outline: none;
      border: 1px solid transparent;
      border-radius: 4px;
      padding: 2px 6px;
      min-width: 120px;
      min-height: 28px;
      background: transparent;
    }
    .deploy-product-name:hover { border-color: var(--border); background: var(--bg); }
    .deploy-product-name:focus { border-color: var(--accent); background: var(--accent-light); }

    .deploy-fields {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 12px;
    }
    .deploy-field { display: flex; flex-direction: column; gap: 4px; }
    .deploy-field .field-label { font-size: 11px; font-weight: 500; color: var(--text-secondary); }
    .deploy-field-label {
      font-size: 11px;
      color: var(--text-muted);
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }
    .deploy-input {
      padding: 7px 10px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 13px;
      color: var(--text);
      background: var(--bg);
      outline: none;
      width: 100%;
      font-family: inherit;
      transition: all 0.15s ease;
    }
    .deploy-input:focus { border-color: var(--accent); background: var(--accent-light); box-shadow: 0 0 0 3px rgba(79,70,229,0.1); }

    .deploy-progress-row {
      margin-bottom: 12px;
    }
    .deploy-progress-text {
      font-size: 13px;
      color: var(--text);
      outline: none;
      border: 1px solid transparent;
      border-radius: 4px;
      padding: 4px 8px;
      width: 100%;
      min-height: 28px;
      background: transparent;
      line-height: 1.5;
    }
    .deploy-progress-text:hover { border-color: var(--border); background: var(--bg); }
    .deploy-progress-text:focus { border-color: var(--accent); background: var(--accent-light); }

    .deploy-sub-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }
    .redmine-item {
      display: flex;
      align-items: flex-start;
      gap: 6px;
      margin-bottom: 4px;
    }
    .redmine-text {
      flex: 1;
      font-size: 13px;
      color: var(--text);
      outline: none;
      border: 1px solid transparent;
      border-radius: 4px;
      padding: 3px 6px;
      min-height: 26px;
      background: transparent;
    }
    .redmine-text:hover { border-color: var(--border); background: var(--bg); }
    .redmine-text:focus { border-color: var(--yellow); background: var(--yellow-light); }

    .deploy-issues-text {
      font-size: 13px;
      color: var(--text);
      outline: none;
      border: 1px solid transparent;
      border-radius: 4px;
      padding: 4px 8px;
      width: 100%;
      min-height: 28px;
      background: transparent;
    }
    .deploy-issues-text:hover { border-color: #fca5a5; background: var(--red-light); }
    .deploy-issues-text:focus { border-color: var(--red); background: var(--red-light); }

    /* ===== CHAT PANEL ===== */
    #chat-panel {
      width: 260px;
      flex-shrink: 0;
      background: linear-gradient(160deg, #FAFBFF 0%, var(--card-bg) 100%);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 28px 24px;
      text-align: center;
    }
    .chat-icon { font-size: 40px; margin-bottom: 14px; opacity: 0.45; }
    .chat-title { font-size: 14px; font-weight: 700; margin-bottom: 7px; color: var(--text); }
    .chat-desc { font-size: 13px; color: var(--text-muted); line-height: 1.65; }
    .chat-phase-badge {
      margin-top: 14px;
      padding: 4px 12px;
      background: var(--accent-light);
      color: var(--accent);
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
      border: 1px solid rgba(79,70,229,0.15);
      letter-spacing: 0.3px;
    }

    /* ===== SCROLLBAR ===== */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #94A3B8; }

    /* ===== NEW ITEM HIGHLIGHT ===== */
    @keyframes newItemFlash {
      0%   { background: #EEF2FF; box-shadow: 0 0 0 2px #A5B4FC; }
      60%  { background: #F5F3FF; box-shadow: 0 0 0 1px #C4B5FD; }
      100% { background: transparent; box-shadow: none; }
    }
    .task-card.new-item {
      animation: newItemFlash 1.2s ease forwards;
    }

    /* ===== NEW TASK POPUP (2026 floating pill) ===== */
    @keyframes taskPopupIn {
      0%   { opacity: 0; transform: translateX(-50%) translateY(-28px) scale(0.92); }
      18%  { opacity: 1; transform: translateX(-50%) translateY(4px)   scale(1.02); }
      28%  { opacity: 1; transform: translateX(-50%) translateY(0)      scale(1);    }
      72%  { opacity: 1; transform: translateX(-50%) translateY(0)      scale(1);    }
      100% { opacity: 0; transform: translateX(-50%) translateY(-16px)  scale(0.95); }
    }
    .task-popup {
      position: fixed;
      top: 76px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 9999;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 32px 16px 24px;
      border-radius: 999px;
      background: linear-gradient(135deg, #4F46E5 0%, #7C3AED 55%, #6D28D9 100%);
      box-shadow:
        0 12px 40px rgba(79, 70, 229, 0.40),
        0 4px 12px  rgba(0, 0, 0, 0.16),
        inset 0 1px 0 rgba(255,255,255,0.18);
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.1px;
      white-space: nowrap;
      pointer-events: none;
      animation: taskPopupIn 3.2s cubic-bezier(0.34, 1.4, 0.64, 1) forwards;
    }
    .task-popup-icon {
      font-size: 18px;
      flex-shrink: 0;
      filter: drop-shadow(0 1px 2px rgba(0,0,0,0.2));
    }
    .task-popup-text {
      line-height: 1.3;
    }
    .task-popup-sub {
      display: block;
      font-size: 12px;
      font-weight: 400;
      opacity: 0.82;
      margin-top: 1px;
    }

    /* ===== TOAST ===== */
    .toast {
      position: fixed;
      bottom: 28px;
      right: 28px;
      background: #1E293B;
      color: #fff;
      padding: 11px 18px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-weight: 500;
      z-index: 9999;
      animation: toastIn 0.2s cubic-bezier(.34,1.56,.64,1);
      box-shadow: 0 8px 24px rgba(15,23,42,0.2), 0 2px 8px rgba(15,23,42,0.12);
      border: 1px solid rgba(255,255,255,0.08);
    }
    @keyframes toastIn {
      from { opacity: 0; transform: translateY(12px) scale(0.96); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ===== CONTENTEDITABLE PLACEHOLDER ===== */
    [contenteditable]:empty::before {
      content: attr(placeholder);
      color: var(--text-muted);
      pointer-events: none;
    }
    [contenteditable] { cursor: text; }

    /* ===== TEAM VIEW ===== */
    .team-view { padding: 28px 32px; }
    .team-summary {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-sm);
      margin-bottom: 20px;
      overflow: hidden;
    }
    .team-summary-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 24px; cursor: pointer; user-select: none;
      border-bottom: 1px solid var(--border-light);
      transition: background 0.15s;
    }
    .team-summary-header:hover { background: var(--bg); }
    .team-summary-title { font-size: 13px; font-weight: 700; color: var(--text-secondary); }
    .team-summary-chevron { color: var(--text-muted); transition: transform 0.22s ease; flex-shrink: 0; }
    .team-summary.collapsed .team-summary-chevron { transform: rotate(-90deg); }
    .team-summary-body {
      display: grid; grid-template-columns: 1fr auto; gap: 24px; align-items: start;
      padding: 22px 24px;
      overflow: hidden;
      transition: max-height 0.28s cubic-bezier(0.4,0,0.2,1), opacity 0.22s ease, padding 0.22s ease;
      max-height: 400px; opacity: 1;
    }
    .team-summary.collapsed .team-summary-body { max-height: 0; opacity: 0; padding-top: 0; padding-bottom: 0; }
    .team-summary.collapsed .team-summary-header { border-bottom-color: transparent; }
    /* 즐겨찾기 */
    .fav-btn {
      background: none; border: none; cursor: pointer; padding: 2px 4px;
      color: var(--text-muted); font-size: 14px; line-height: 1;
      transition: color 0.15s, transform 0.15s;
      flex-shrink: 0;
    }
    .fav-btn:hover { color: #f59e0b; transform: scale(1.2); }
    .fav-btn.active { color: #f59e0b; }
    .fav-cards {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px;
      padding: 16px 0 20px;
    }
    .fav-card {
      background: var(--card-bg); border: 1px solid var(--border);
      border-radius: var(--radius-md); padding: 14px 18px;
      box-shadow: var(--shadow-xs); position: relative;
      border-top: 3px solid #f59e0b;
    }
    .fav-card-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 6px; margin-bottom: 2px; }
    .fav-card-header-left { flex: 1; min-width: 0; }
    .fav-card-type { font-size: 10px; font-weight: 700; letter-spacing: 0.5px;
      color: #f59e0b; text-transform: uppercase; margin-bottom: 3px; }
    .fav-card-title { font-size: 14px; font-weight: 800; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .fav-card-meta { font-size: 11px; color: var(--text-muted); margin: 3px 0 8px; }
    .fav-card-bar { display: flex; align-items: center; gap: 8px; }
    .fav-card-actions { display: flex; align-items: center; gap: 2px; flex-shrink: 0; }
    .fav-card-remove, .fav-card-toggle {
      background: none; border: none; cursor: pointer;
      color: var(--text-muted); font-size: 12px; padding: 3px 5px; line-height: 1;
      border-radius: 4px; transition: background 0.12s, color 0.12s;
    }
    .fav-card-remove:hover { color: var(--red); background: var(--red-light); }
    .fav-card-toggle:hover { color: var(--accent); background: rgba(79,70,229,0.08); }
    .fav-card-detail {
      overflow: hidden; transition: max-height 0.26s cubic-bezier(0.4,0,0.2,1), opacity 0.2s ease;
      max-height: 0; opacity: 0;
    }
    .fav-card-detail.open { max-height: 600px; opacity: 1; }
    .fav-detail-section { margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border-light); }
    .fav-detail-label { font-size: 10px; font-weight: 700; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 4px; }
    .fav-detail-list { font-size: 12px; color: var(--text-secondary); line-height: 1.6; }
    .fav-detail-list li { list-style: none; padding-left: 10px; position: relative; }
    .fav-detail-list li::before { content: '•'; position: absolute; left: 0; color: var(--text-muted); }
    .fav-detail-empty { font-size: 12px; color: var(--text-muted); font-style: italic; }
    .team-progress-list { display: flex; flex-direction: column; gap: 12px; }
    .team-member-progress { display: flex; align-items: center; gap: 10px; }
    .team-member-name { font-size: 13px; font-weight: 700; width: 56px; flex-shrink: 0; color: var(--text); }
    .team-progress-bg { flex: 1; height: 6px; background: var(--border-light); border-radius: 10px; overflow: hidden; min-width: 80px; }
    .team-progress-fill { height: 100%; background: var(--accent-gradient); border-radius: 10px; transition: width 0.4s cubic-bezier(.34,1.56,.64,1); }
    .team-progress-pct { font-size: 12px; font-weight: 700; color: var(--accent); width: 36px; text-align: right; flex-shrink: 0; }
    .team-count-cards { display: flex; flex-direction: column; gap: 8px; }
    .team-count-card {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 18px; background: var(--bg); border: 1px solid var(--border);
      border-radius: var(--radius-sm); min-width: 140px; gap: 16px;
    }
    .team-count-card.warn { border-color: #FCA5A5; background: var(--red-light); }
    .team-count-num { font-size: 22px; font-weight: 800; color: var(--text); }
    .team-count-card.warn .team-count-num { color: var(--red); }
    .team-count-label { font-size: 12px; color: var(--text-secondary); font-weight: 500; }
    /* Card view */
    .team-card-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; padding: 20px; }
    .team-card {
      background: var(--card-bg); border: 1px solid var(--border); border-radius: var(--radius-md);
      padding: 18px 20px; transition: all 0.18s ease;
      box-shadow: var(--shadow-xs);
    }
    .team-card:hover { border-color: var(--accent); box-shadow: 0 4px 16px rgba(79,70,229,0.12); }
    .team-card-header { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; cursor: pointer; user-select: none; }
    .team-card.collapsed .team-card-header { margin-bottom: 0; }
    .team-card-body { overflow: hidden; transition: max-height 0.28s cubic-bezier(0.4,0,0.2,1), opacity 0.22s ease; max-height: 400px; opacity: 1; }
    .team-card.collapsed .team-card-body { max-height: 0; opacity: 0; }
    .team-card-chevron { margin-left: auto; flex-shrink: 0; color: var(--text-muted); transition: transform 0.22s ease; }
    .team-card.collapsed .team-card-chevron { transform: rotate(-90deg); }
    .team-card-name { font-size: 15px; font-weight: 800; color: var(--text); }
    .team-card-division {
      font-size: 10px; padding: 3px 8px; background: var(--bg);
      border: 1px solid var(--border); border-radius: 20px; color: var(--text-secondary); font-weight: 600;
    }
    .team-card-issue-badge {
      font-size: 11px; font-weight: 700;
      color: var(--red); background: var(--red-light); padding: 3px 8px; border-radius: 20px;
    }
    .team-card-task { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; border-bottom: 1px solid var(--border-light); gap: 8px; }
    .team-card-task:last-child { border-bottom: none; }
    .team-card-kpi { font-size: 13px; color: var(--text); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .team-card-pct { font-size: 12px; font-weight: 700; color: var(--accent); flex-shrink: 0; }
    .team-card-empty { font-size: 12px; color: var(--text-muted); padding: 4px 0; }
    .team-card-footer { display: flex; align-items: center; gap: 8px; margin-top: 12px; padding-top: 10px; border-top: 1px solid var(--border-light); }
    /* Toggle */
    .team-view-toggle { display: flex; gap: 4px; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 3px; }
    .team-toggle-btn {
      padding: 5px 14px; font-size: 12px; font-weight: 600; border-radius: 7px;
      border: none; background: none; cursor: pointer;
      color: var(--text-secondary); font-family: inherit; transition: all 0.15s ease;
    }
    .team-toggle-btn.active { background: var(--card-bg); color: var(--accent); box-shadow: var(--shadow-xs); font-weight: 700; }
    .team-toggle-btn:not(.active):hover { color: var(--text); }
    /* Table view */
    .team-table-wrap { overflow-x: auto; }
    .team-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .team-table thead tr { background: #F8FAFF; }
    .team-table th {
      padding: 10px 14px; text-align: left; font-size: 10px; font-weight: 700;
      color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.7px;
      border-bottom: 1px solid var(--border);
    }
    .team-table-row { border-bottom: 1px solid var(--border-light); }
    .team-table-row:last-child { border-bottom: none; }
    .team-table-row.has-issue { background: #FFFBF0; }
    .team-td { padding: 10px 14px; vertical-align: top; color: var(--text); line-height: 1.6; white-space: pre-line; }
    .team-td-member {
      font-weight: 700; font-size: 13px; color: var(--text);
      padding: 10px 14px; vertical-align: top;
      border-right: 1px solid var(--border); white-space: nowrap; background: #F8FAFF;
    }
    .team-td-kpi { font-weight: 500; outline: none; min-width: 120px; }
    .team-td-kpi:focus { background: var(--accent-light); border-radius: var(--radius-sm); }
    .team-td-activity { min-width: 160px; color: var(--text-secondary); font-size: 12px; }
    .team-td-pct { text-align: center; white-space: nowrap; }
    .team-td-issue { color: var(--red); font-size: 12px; }
    .issue-cell { background: var(--red-light); }

    /* ===== PROGRESS INDICATOR ===== */
    .progress-bar-wrap {
      display: none;
      align-items: center;
      gap: 8px;
      margin-top: 4px;
    }
    .progress-bar-bg {
      flex: 1;
      height: 4px;
      background: var(--border-light);
      border-radius: 10px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: var(--accent-gradient);
      border-radius: 10px;
      transition: width 0.4s cubic-bezier(.34,1.56,.64,1);
    }
    .progress-pct {
      font-size: 11px;
      font-weight: 700;
      color: var(--accent);
      min-width: 30px;
      text-align: right;
    }

    /* ===== BUTTON FEEDBACK ===== */
    .add-btn:active, .export-btn:active, .period-apply-btn:active {
      transform: scale(0.96) !important;
    }

    /* ===== NEW SUB-ITEM FLASH ===== */
    @keyframes newSubItemFlash {
      0%   { background: var(--accent-light); box-shadow: 0 0 0 2px #A5B4FC; border-radius: var(--radius-sm); }
      60%  { background: var(--accent-light); }
      100% { background: transparent; box-shadow: none; }
    }
    .activity-item.new-sub-item,
    .issue-item.new-sub-item,
    .op-item.new-sub-item { animation: newSubItemFlash 1s ease forwards; }

    /* ===== ADD MEMBER MODAL ===== */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(15,23,42,0.4);
      backdrop-filter: blur(4px);
      display: flex; align-items: center; justify-content: center;
      z-index: 10000;
      animation: toastIn 0.18s ease;
    }
    .modal-box {
      background: var(--card-bg);
      border-radius: var(--radius-lg);
      padding: 28px;
      width: 320px;
      box-shadow: var(--shadow-lg);
      border: 1px solid var(--border);
    }
    .modal-title {
      font-size: 17px; font-weight: 800; color: var(--text); margin-bottom: 18px;
    }
    .modal-field { margin-bottom: 14px; }
    .modal-field label {
      font-size: 12px; color: var(--text-secondary); display: block;
      margin-bottom: 5px; font-weight: 600; letter-spacing: 0.2px;
    }
    .modal-field input, .modal-field select {
      width: 100%; padding: 9px 12px; border: 1px solid var(--border);
      border-radius: var(--radius-sm); font-size: 14px; color: var(--text); outline: none;
      background: var(--bg); font-family: inherit; transition: all 0.15s ease;
    }
    .modal-field input:focus, .modal-field select:focus { border-color: var(--accent); background: var(--accent-light); box-shadow: 0 0 0 3px rgba(79,70,229,0.1); }
    .modal-actions {
      display: flex; gap: 8px; margin-top: 20px; justify-content: flex-end;
    }
    .modal-cancel-btn {
      padding: 9px 18px; background: none; border: 1px solid var(--border);
      border-radius: var(--radius-sm); font-size: 13px; font-weight: 600; cursor: pointer;
      color: var(--text-secondary); font-family: inherit; transition: all 0.15s;
    }
    .modal-cancel-btn:hover { background: var(--bg); border-color: var(--text-muted); }
    .modal-confirm-btn {
      padding: 9px 18px; background: var(--accent-gradient); border: none;
      border-radius: var(--radius-sm); font-size: 13px; font-weight: 700; cursor: pointer;
      color: #fff; font-family: inherit; transition: all 0.15s ease;
      box-shadow: 0 2px 8px rgba(79,70,229,0.25);
    }
    .modal-confirm-btn:hover { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(79,70,229,0.35); }

    /* ===== SIDEBAR ADD MEMBER BTN ===== */
    .reset-btn {
      width: 100%; margin-top: 6px; padding: 7px;
      background: none; border: 1px solid var(--border);
      border-radius: var(--radius-sm); color: var(--text-muted); font-size: 12px;
      cursor: pointer; transition: all 0.15s; font-family: inherit; font-weight: 500;
    }
    .reset-btn:hover { border-color: var(--red); color: var(--red); background: var(--red-light); }

    .sidebar-add-member {
      padding: 4px 8px 8px; flex-shrink: 0;
    }
    .sidebar-add-member-btn {
      width: 100%; padding: 7px 10px; background: none;
      border: 1.5px dashed var(--border); border-radius: var(--radius-sm);
      color: var(--text-muted); font-size: 13px; cursor: pointer;
      transition: all 0.15s; font-family: inherit; text-align: left; font-weight: 500;
    }
    .sidebar-add-member-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); border-style: solid; }

    /* ===== NOTIFICATIONS ===== */
    .notif-wrap {
      position: relative;
    }
    .notif-bell-btn {
      background: rgba(255,255,255,0.18);
      border: 1px solid rgba(255,255,255,0.28);
      border-radius: 8px;
      color: #fff;
      cursor: pointer;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      position: relative;
      flex-shrink: 0;
      transition: background 0.15s;
    }
    .notif-bell-btn:hover { background: rgba(255,255,255,0.28); }
    .notif-badge {
      position: absolute;
      top: -5px;
      right: -5px;
      background: #EF4444;
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      min-width: 16px;
      height: 16px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 3px;
      pointer-events: none;
    }
    .notif-panel {
      position: fixed;
      top: 58px;
      left: 0;
      width: 252px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-lg);
      z-index: 9999;
      overflow: hidden;
      display: none;
    }
    .notif-panel.open { display: block; }
    .notif-panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
    }
    .notif-mark-read-btn {
      font-size: 11px;
      color: var(--accent);
      background: none;
      border: none;
      cursor: pointer;
      padding: 2px 4px;
      border-radius: 4px;
    }
    .notif-mark-read-btn:hover { background: var(--accent-light); }
    .notif-list { max-height: 320px; overflow-y: auto; }
    .notif-empty {
      padding: 24px 16px;
      text-align: center;
      font-size: 13px;
      color: var(--text-muted);
    }
    .notif-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border-light);
      cursor: default;
      transition: background 0.1s;
    }
    .notif-item:last-child { border-bottom: none; }
    .notif-item.unread { background: var(--accent-light); }
    .notif-item:hover { background: var(--bg); }
    .notif-item-icon { font-size: 14px; flex-shrink: 0; margin-top: 1px; }
    .notif-item-body { flex: 1; min-width: 0; }
    .notif-item-msg {
      font-size: 12px;
      color: var(--text);
      line-height: 1.4;
      word-break: break-word;
    }
    .notif-item-time {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 2px;
    }
    .notif-new-dot {
      width: 6px;
      height: 6px;
      background: var(--accent);
      border-radius: 50%;
      flex-shrink: 0;
      margin-top: 5px;
    }

    /* ===== LANDING PAGE ===== */
    @keyframes landingFadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes landingCardIn {
      from { opacity: 0; transform: translateY(28px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0)    scale(1); }
    }
    @keyframes landingFadeOut {
      from { opacity: 1; transform: scale(1); }
      to   { opacity: 0; transform: scale(1.04); }
    }
    @keyframes landingShake {
      0%,100% { transform: translateX(0); }
      20%     { transform: translateX(-8px); }
      40%     { transform: translateX(8px); }
      60%     { transform: translateX(-5px); }
      80%     { transform: translateX(5px); }
    }
    .landing-overlay {
      position: fixed; inset: 0; z-index: 10000;
      /* 메인 앱 인디고 팔레트의 다크 버전 — 진입 시 이질감 최소화 */
      background: linear-gradient(145deg, #0C0A1E 0%, #13103A 35%, #1A1650 65%, #0F0C2E 100%);
      display: flex; align-items: center; justify-content: center;
      animation: landingFadeIn 0.5s ease;
    }
    .landing-overlay.closing { animation: landingFadeOut 0.45s ease forwards; pointer-events: none; }
    .landing-bg-orb {
      position: absolute; border-radius: 50%; filter: blur(90px); pointer-events: none;
    }
    .landing-bg-orb-1 {
      width: 600px; height: 600px; background: rgba(79,70,229,0.22);
      top: -160px; left: -140px;
      filter: blur(110px);
    }
    .landing-bg-orb-2 {
      width: 500px; height: 500px; background: rgba(124,58,237,0.18);
      bottom: -130px; right: -100px;
      filter: blur(100px);
    }
    .landing-bg-orb-3 {
      width: 300px; height: 300px; background: rgba(139,92,246,0.14);
      top: 32%; left: 52%;
      filter: blur(80px);
    }
    .landing-bg-orb-4 {
      width: 380px; height: 380px; background: rgba(55,48,163,0.2);
      top: 10%; left: 5%;
      filter: blur(90px);
    }
    .landing-card {
      position: relative; z-index: 1;
      background: rgba(255,255,255,0.055);
      backdrop-filter: blur(48px) saturate(1.6);
      -webkit-backdrop-filter: blur(48px) saturate(1.6);
      border: 1px solid rgba(255,255,255,0.11);
      /* 2026 squircle — 카드 자체가 둥글게 */
      border-radius: 56px;
      padding: 56px 52px 52px;
      text-align: center;
      max-width: 400px; width: calc(100% - 48px);
      box-shadow:
        0 48px 120px rgba(0,0,0,0.5),
        0 8px 32px rgba(79,70,229,0.15),
        inset 0 1px 0 rgba(255,255,255,0.1);
      animation: landingCardIn 0.55s cubic-bezier(0.34,1.3,0.64,1) 0.1s both;
    }
    /* 로고 — 원형 배지 (누끼 성공 시 투명, 실패 시 흰 원) */
    @keyframes logoGlow {
      0%, 100% { box-shadow:
        0 0 0 6px  rgba(255,255,255,0.08),
        0 0 30px 6px  rgba(255,255,255,0.45),
        0 0 70px 20px rgba(165,180,252,0.35),
        0 0 120px 40px rgba(124,58,237,0.2),
        0 16px 48px   rgba(0,0,0,0.35); }
      50% { box-shadow:
        0 0 0 10px rgba(255,255,255,0.12),
        0 0 50px 14px rgba(255,255,255,0.75),
        0 0 100px 35px rgba(165,180,252,0.5),
        0 0 160px 60px rgba(124,58,237,0.3),
        0 16px 48px   rgba(0,0,0,0.35); }
    }
    .landing-logo-wrap {
      margin: 0 auto 32px;
      width: 150px; height: 150px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      background: rgba(255,255,255,0.92);
      border: 2px solid rgba(255,255,255,0.6);
      overflow: hidden;
      animation: logoGlow 2.8s ease-in-out infinite;
      transition: background 0.4s, border 0.4s;
    }
    .landing-logo-wrap.nukki-done {
      background: rgba(255,255,255,0.88);
      border: 2px solid rgba(255,255,255,0.6);
      overflow: hidden;
    }
    .landing-logo-img {
      width: 110px; height: 110px;
      object-fit: contain;
      display: block;
    }
    .landing-logo-wrap.nukki-done .landing-logo-img {
      width: 110px; height: 110px;
      filter: drop-shadow(0 0 8px rgba(255,255,255,0.9))
              drop-shadow(0 2px 6px rgba(0,0,0,0.2));
    }
    .landing-title {
      font-size: 11px; font-weight: 600; letter-spacing: 4.5px;
      text-transform: uppercase;
      background: linear-gradient(90deg, #A5B4FC 0%, #C4B5FD 55%, #DDD6FE 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 28px;
    }
    .landing-input {
      width: 100%; padding: 15px 24px;
      /* 완전 pill */
      border-radius: 999px;
      border: 1px solid rgba(165,180,252,0.28);
      background: rgba(79,70,229,0.09);
      color: #fff; font-size: 15px; font-weight: 500;
      outline: none; text-align: center;
      font-family: inherit; box-sizing: border-box;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
      margin-bottom: 10px;
    }
    .landing-input::placeholder { color: rgba(255,255,255,0.3); }
    .landing-input:focus {
      border-color: rgba(165,180,252,0.65);
      background: rgba(79,70,229,0.15);
      box-shadow: 0 0 0 4px rgba(79,70,229,0.18);
    }
    .landing-input.shake { animation: landingShake 0.35s ease; }
    .landing-btn {
      width: 100%; padding: 15px 24px; border: none;
      /* 완전 pill 버튼 */
      border-radius: 999px;
      background: linear-gradient(135deg, #4F46E5 0%, #7C3AED 100%);
      color: #fff; font-size: 13px; font-weight: 700;
      cursor: pointer; font-family: inherit;
      letter-spacing: 2px; text-transform: uppercase;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      transition: transform 0.15s, box-shadow 0.15s, filter 0.15s;
      box-shadow:
        0 10px 32px rgba(79,70,229,0.42),
        inset 0 1px 0 rgba(255,255,255,0.18);
    }
    .landing-btn:hover {
      transform: translateY(-2px);
      filter: brightness(1.1);
      box-shadow: 0 16px 40px rgba(79,70,229,0.58);
    }
    .landing-btn:hover .landing-btn-arrow { transform: translateX(5px); }
    .landing-btn:active { transform: translateY(0); filter: brightness(0.95); }
    .landing-btn-arrow { transition: transform 0.22s cubic-bezier(0.34,1.5,0.64,1); flex-shrink: 0; }

    /* ===== TEAM OPERATIONS TABLE ===== */
    .team-ops-section { margin-top: 20px; }
    .team-ops-table .op-type-badge {
      display: inline-block; font-size: 10px; font-weight: 700;
      padding: 2px 8px; border-radius: 20px; white-space: nowrap;
    }
    .op-type-badge.current { background: var(--accent-light); color: var(--accent); }
    .op-type-badge.next    { background: #FEF3C7; color: #92400E; }
    .team-detail-list { list-style: none; margin: 4px 0 0; padding: 0; }
    .team-detail-list li {
      font-size: 11px; color: var(--text-muted); padding: 1px 0 1px 12px;
      position: relative; line-height: 1.5;
    }
    .team-detail-list li::before {
      content: '↳'; position: absolute; left: 0;
      color: var(--accent); font-size: 10px;
    }

  </style>
</head>
<body>

<!-- ===== SIDEBAR ===== -->
<aside id="sidebar">
  <div class="sidebar-logo" style="display:flex;align-items:center;justify-content:space-between;">
    <div style="display:flex;align-items:center;gap:10px;">
      <div class="sidebar-logo-icon" id="sidebarLogoIcon">W</div>
      <div class="sidebar-logo-text">
        <div class="sidebar-team-name-wrap" id="sidebarTeamNameWrap" onclick="editTeamName()" title="클릭하여 팀명 변경">
          <span id="sidebarTeamName">팀 이름</span>
          <svg class="sidebar-edit-icon" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        </div>
        <div class="sidebar-sub-label">주간업무보고</div>
      </div>
    </div>
    <div id="notifBellMount"></div>
  </div>
  <div id="notifPanel" class="notif-panel"></div>

  <div class="sidebar-period">
    <label>보고 기간</label>
    <div class="period-display" id="periodDisplay" onclick="togglePeriodInputs()">
      <span id="periodLabel">로딩 중...</span>
      <span class="period-edit-icon">›</span>
    </div>
    <div class="period-inputs" id="periodInputs">
      <input type="number" id="yearInput" placeholder="년도" min="2020" max="2035">
      <select id="monthInput"></select>
      <select id="weekInput"></select>
      <button class="period-apply-btn" onclick="applyPeriod()">적용</button>
    </div>
  </div>

  <div id="teamTab" class="sidebar-item" onclick="switchTab('__team__')">
    팀 현황
  </div>

  <div class="sidebar-section-label">팀원</div>
  <div id="memberList"></div>
  <div class="sidebar-add-member">
    <button class="sidebar-add-member-btn" onclick="showAddMemberModal()">+ 팀원 추가</button>
  </div>

  <div class="sidebar-spacer"></div>

// ============================================================
// STATE PERSISTENCE
// ============================================================
function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
}

function setMemberStatus(memberId, status) {
  if (state.members[memberId]) {
    state.members[memberId].status = status;
    if (status === 'done') state.members[memberId].updatedAt = Date.now();
  }
  saveState();
  const notifType = status === 'done' ? 'status_done' : 'status_editing';
  pushNotification(notifType, memberId, getMember(memberId)?.name || memberId);
  renderSidebar();
  renderMain();
}

function formatUpdatedAt(ts) {
  if (!ts) return null;
  const d = new Date(ts);
  const mo = d.getMonth() + 1, day = d.getDate();
  const hh = String(d.getHours()).padStart(2,'0'), mm = String(d.getMinutes()).padStart(2,'0');
  return `${mo}/${day} ${hh}:${mm}`;
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) { state = getDefaultState(); return; }
    const saved = JSON.parse(raw);
    state = getDefaultState();
    if (saved.meta)      Object.assign(state.meta, saved.meta);
    if (saved.members)   Object.assign(state.members, saved.members);
    if (saved.activeTab  !== undefined) state.activeTab  = saved.activeTab;
    if (saved.favorites  !== undefined) state.favorites  = saved.favorites;
    if (saved.teamViewMode !== undefined) state.teamViewMode = saved.teamViewMode;
  } catch(e) {
    state = getDefaultState();
  }
}

function generateId() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 9);
}

// ============================================================
// XSS PREVENTION
// ============================================================
function esc(str) {
  if (str == null) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

// ============================================================
// HELPERS
// ============================================================
function periodText() {
  const { year, month, week } = state.meta;
  return `${year}년 ${month}월 ${week}주차`;
}

function getMember(id) {
  return state.meta.members.find(m => m.id === id);
}

function getMemberData(id) {
  return state.members[id] || getEmptyMemberData();
}

// ============================================================
// SIDEBAR
// ============================================================
function updateSidebarTeamName() {
  const name = state.meta.teamName || '팀 이름';
  const nameEl = document.getElementById('sidebarTeamName');
  const iconEl  = document.getElementById('sidebarLogoIcon');
  if (nameEl) nameEl.textContent = name;
  if (iconEl)  iconEl.textContent = name.charAt(0) || 'W';
}

function editTeamName() {
  const wrap = document.getElementById('sidebarTeamNameWrap');
  if (!wrap) return;
  const current = state.meta.teamName || '';

  const input = document.createElement('input');
  input.type = 'text';
  input.value = current;
  input.className = 'sidebar-team-name-input';
  input.maxLength = 24;

  function save() {
    const val = input.value.trim();
    if (val && val !== current) {
      state.meta.teamName = val;
      saveState();
      if (state.activeTab === '__team__') renderMain();
    }
    updateSidebarTeamName();
    // input 제거 후 wrap 원복
    input.replaceWith(document.getElementById('sidebarTeamNameWrap') ? input : wrap);
    renderSidebar();
  }

  input.onblur = save;
  input.onkeydown = e => {
    if (e.key === 'Enter')  { input.blur(); }
    if (e.key === 'Escape') { input.value = current; input.blur(); }
  };

  wrap.replaceWith(input);
  input.select();
}

function renderSidebar() {
  updateSidebarTeamName();

  // Period display
  document.getElementById('periodLabel').textContent = periodText();

  // Year input
  const yearEl = document.getElementById('yearInput');
  if (yearEl) yearEl.value = state.meta.year;

  // Month select
  const monthEl = document.getElementById('monthInput');
  if (monthEl) {
    monthEl.innerHTML = Array.from({length: 12}, (_, i) =>
      `<option value="${i+1}"${state.meta.month === i+1 ? ' selected' : ''}>${i+1}월</option>`
    ).join('');
  }

  // Week select
  const weekEl = document.getElementById('weekInput');
  if (weekEl) {
    weekEl.innerHTML = Array.from({length: 5}, (_, i) =>
      `<option value="${i+1}"${state.meta.week === i+1 ? ' selected' : ''}>${i+1}주차</option>`
    ).join('');
  }

  // 팀 현황 tab active 상태 갱신
  const teamTabEl = document.getElementById('teamTab');
  if (teamTabEl) {
    teamTabEl.className = 'sidebar-item' + (state.activeTab === '__team__' ? ' active' : '');
  }

  // Member list
  document.getElementById('memberList').innerHTML = state.meta.members.map(m => {
    const mdata = state.members[m.id] || {};
    const hasDone = mdata.updatedAt != null;
    const timeStr = hasDone ? formatUpdatedAt(mdata.updatedAt) : null;
    return `<div class="sidebar-item${state.activeTab === m.id ? ' active' : ''}" onclick="switchTab('${m.id}')">
      <div class="sidebar-item-row">
        <span class="sidebar-item-name">${esc(m.name)}</span>
        ${hasDone ? '<span class="sidebar-done-badge">✓</span>' : ''}
        <button class="member-delete-btn" onclick="removeMember('${m.id}',event)" title="팀원 삭제">×</button>
      </div>
      ${timeStr ? `<div class="sidebar-item-time">${timeStr}</div>` : ''}
    </div>`;
  }).join('');

  // 벨 마운트 동기화 (renderSidebar가 DOM을 교체하지 않으므로 badge만 갱신)
  updateNotifBadge();
}

function togglePeriodInputs() {
  document.getElementById('periodInputs').classList.toggle('show');
}

function applyPeriod() {
  const year  = Number(document.getElementById('yearInput').value);
  const month = Number(document.getElementById('monthInput').value);
  const week  = Number(document.getElementById('weekInput').value);
  if (year >= 2020 && year <= 2035 && month >= 1 && month <= 12 && week >= 1 && week <= 5) {
    state.meta.year  = year;
    state.meta.month = month;
    state.meta.week  = week;
    saveState();
  }
  // Update display
  document.getElementById('periodLabel').textContent = periodText();
  // Close inputs
  document.getElementById('periodInputs').classList.remove('show');
  // Flash confirmation
  const display = document.getElementById('periodDisplay');
  display.classList.remove('applied');
  void display.offsetWidth; // reflow
  display.classList.add('applied');
  setTimeout(() => display.classList.remove('applied'), 1200);
  // Re-render main (period shown in header)
  renderMain();
}

function updatePeriod(field, value) {
  // kept for compatibility but no longer used by HTML
  state.meta[field] = Number(value);
  saveState();
}

function switchTab(memberId) {
  state.activeTab = memberId;
  saveState();
  renderSidebar();
  renderMain();
}

// ============================================================
// MAIN RENDER
// ============================================================
function renderMain() {
  if (state.activeTab === '__team__') {
    document.getElementById('mainContent').innerHTML = renderTeamView();
    return;
  }
  const memberId = state.activeTab;
  const member = getMember(memberId);
  const data = getMemberData(memberId);

  const mdata = state.members[memberId] || {};
  const isEditing = mdata.status === 'editing';
  document.getElementById('mainContent').innerHTML = `
    <div class="member-header">
      <h1>${esc(member.name)}</h1>
      <span class="period-tag">· ${periodText()} 주간보고</span>
      <div class="member-status-bar">
        <button class="member-reset-btn" onclick="resetMemberData('${memberId}')" title="${esc(member.name)}님 데이터 초기화">
          <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
          초기화
        </button>
        ${isEditing
          ? `<button class="status-btn status-done-btn" onclick="setMemberStatus('${memberId}','done')">작성완료</button>`
          : `${mdata.updatedAt ? '<span class="status-done-label"><span class="status-check-icon">✓</span> 작성완료</span>' : ''}<button class="status-btn status-edit-btn" onclick="setMemberStatus('${memberId}','editing')">수정하기</button>`
        }
      </div>
    </div>
    <div class="content-body${isEditing ? '' : ' content-locked'}">
      ${renderTasksSection(memberId, data)}
      ${renderOperationsSection(memberId, data)}
      ${renderDeploymentsSection(memberId, data)}
    </div>
  `;
}

  const inner = data.tasks.length === 0

    : data.tasks.map(t => renderTaskCard(memberId, t)).join('');

  return `
    <div class="section">
      <div class="section-header">
        <span class="section-title">과제</span>
        <button class="add-btn" onclick="addTask('${memberId}')">+ 과제 추가</button>
      </div>
      ${inner}
    </div>`;
}

function renderTaskCard(memberId, task) {
  const pct = task.overallProgress || 0;
  const progressBarWidth = Math.min(100, Math.max(0, pct));

  const currentItemsHtml = (task.currentWeekItems || []).map(item =>
    renderActivityItem(memberId, task.id, 'current', item)
  ).join('');

  const nextItemsHtml = (task.nextWeekItems || []).map(item =>
    renderActivityItem(memberId, task.id, 'next', item)
  ).join('');

  const issueItemsHtml = (task.issues || []).map(issue =>
    renderIssueItem(memberId, task.id, issue)
  ).join('');

  return `
    <div class="task-card" data-task-id="${task.id}">
      <div class="task-meta">
        <div class="task-meta-header">
          <div contenteditable="true" class="task-kpi"
               placeholder="KPI / 제품명"
               data-member="${memberId}" data-task="${task.id}" data-field="kpiProduct"
               onblur="updateTaskCEField(this)">${esc(task.kpiProduct || '')}</div>

function addTask(memberId) {
  const member = getMember(memberId);
  const task = {
    id: generateId(),
    kpiProduct: '',
    division: member ? member.division : '기타',
    deadline: '',
    overallProgress: 0,
    currentWeekItems: [],
    nextWeekItems: [],
    issues: [],
  };
  getMemberData(memberId).tasks.push(task);
  saveState();
  pushNotification('task_add', memberId, getMember(memberId)?.name || memberId, task.kpiProduct || '새 과제');
  renderMain();
  const totalTasks = getMemberData(memberId).tasks.length;
  showToast('✓ 과제가 추가되었습니다 (총 ' + totalTasks + '개)');
  requestAnimationFrame(() => {
    const card = document.querySelector('.task-card[data-task-id="' + task.id + '"]');
    if (card) {
      card.classList.add('new-item');
      showTaskPopup('새 과제가 추가되었습니다', 'KPI / 제품명을 입력해 주세요');
      card.scrollIntoView({ behavior: 'smooth', block: 'center' });
      card.querySelector('.task-kpi')?.focus();
    }
  });
}

function removeTask(memberId, taskId) {
  if (!confirm('이 과제를 삭제하시겠습니까?')) return;
  const data = getMemberData(memberId);
  const taskName = data.tasks.find(t => t.id === taskId)?.kpiProduct || '과제';
  data.tasks = data.tasks.filter(t => t.id !== taskId);
  saveState();
  pushNotification('task_delete', memberId, getMember(memberId)?.name || memberId, taskName);
  renderMain();
}

function updateTaskCEField(el) {
  const { member: memberId, task: taskId, field } = el.dataset;
  const task = getMemberData(memberId).tasks.find(t => t.id === taskId);
  if (task) { task[field] = el.textContent.trim(); saveState(); }
}

function updateTaskField(memberId, taskId, field, value) {
  const task = getMemberData(memberId).tasks.find(t => t.id === taskId);
  if (task) { task[field] = value; saveState(); }
  // Re-render for progress bar update
  if (field === 'overallProgress') renderMain();
}

function addTaskItem(memberId, taskId, type) {

  const newItem = { id: generateId(), text: '', progress: 0, details: [] };

  saveState();
  renderMain();
  requestAnimationFrame(() => {

    if (el) {
      el.classList.add('new-sub-item');
      el.querySelector('.activity-text')?.focus();

    }
  });
}
