// EXCEL EXPORT
// ============================================================
async function exportToExcel() {
  showToast('Excel 파일 생성 중...');
  try {
    const wb = new ExcelJS.Workbook();
    // 팀 통합 시트 (첫 번째)
    buildTeamSheet(wb.addWorksheet(state.meta.teamName));
    // 개인 시트
    for (const member of state.meta.members) {
      const ws = wb.addWorksheet(member.name);
      buildMemberSheet(ws, member.id);
    }
    const buffer = await wb.xlsx.writeBuffer();
    const blob = new Blob([buffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `${state.meta.teamName}_주간업무보고_${state.meta.month}월_${state.meta.week}주차.xlsx`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showToast('✓ Excel 내보내기 완료!');
  } catch (err) {
    console.error('Excel export error:', err);
    showToast('오류: ' + err.message);
  }
}

// ============================================================
// EXCEL SHEET BUILDER — 예시.xlsx 포맷 그대로
// ============================================================
function buildMemberSheet(ws, memberId) {
  const member  = getMember(memberId);
  const data    = getMemberData(memberId);

  // ── 컬럼 너비 (예시.xlsx 그대로) ──
  ws.getColumn(1).width = 9;         // A spacer
  ws.getColumn(2).width = 28;        // B KPI/제품
  ws.getColumn(3).width = 16.83;     // C 금주활동
  ws.getColumn(4).width = 14;        // D 배포기한
  ws.getColumn(5).width = 24.33;     // E
  ws.getColumn(6).width = 15.83;     // F 차주계획
  ws.getColumn(7).width = 34.25;     // G
  ws.getColumn(8).width = 9;         // H spacer

  // ── 포맷 상수 (예시.xlsx 추출값) ──
  const HDR_FILL   = { type: 'pattern', pattern: 'solid', fgColor: { theme: 0, tint: -0.1499984740745262 }, bgColor: { indexed: 64 } };
  const GRAY_FILL  = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFF2F2F2' }, bgColor: { indexed: 64 } };
  const WHITE_FILL = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFFFFFFF' }, bgColor: { indexed: 64 } };
  const HDR_FONT   = { size: 10, name: 'GC120', color: { theme: 1 } };
  const DATA_FONT  = { size: 10, name: 'GC120', color: { theme: 1 } };
  const T = { style: 'thin', color: { indexed: 64 } }; // thin border

  const FULL = { top: T, bottom: T, left: T, right: T };

  // ── 전체 셀 흰색 배경 (헤더 셀은 이후에 덮어씀) ──
  for (var wr = 1; wr <= 200; wr++) {
    for (var wc = 1; wc <= 21; wc++) {
      ws.getRow(wr).getCell(wc).fill = WHITE_FILL;
    }
  }

  // ── Rows 1-3: 빈 행 (예시.xlsx와 동일하게 비워둠) ──

  // ── Row 4: 주간보고 ──
  ws.getRow(4).height = 30;
  ws.mergeCells('B4:G4');
  const h4 = ws.getCell('B4');
  h4.value     = '주간보고';
  h4.fill      = HDR_FILL;
  h4.font      = HDR_FONT;
  h4.alignment = { horizontal: 'center', vertical: 'middle' };
  h4.border    = FULL;

  // ── Row 5: 컬럼 헤더 ──
  ws.getRow(5).height = 30;
  ws.mergeCells('C5:E5');
  ws.mergeCells('F5:G5');
  function hdrCell(addr, text) {
    const c = ws.getCell(addr);
    c.value     = text;
    c.fill      = HDR_FILL;
    c.font      = HDR_FONT;
    c.alignment = { horizontal: 'center', vertical: 'middle' };
    c.border    = FULL;
  }
  hdrCell('B5', 'KPI/제품');
  hdrCell('C5', '금주활동');
  hdrCell('F5', '차주계획');

  // ── 헬퍼 ──
  function setVal(addr, val, opts) {
    if (val === null || val === undefined || val === '') return;
    var c = ws.getCell(addr);
    c.value = val;
    c.font  = DATA_FONT;
    c.fill  = WHITE_FILL;
    c.alignment = opts && opts.center
      ? { horizontal: 'center', vertical: 'middle', wrapText: false }
      : { vertical: 'top', wrapText: false };
  }
  // 빈 셀에도 흰 배경 + 기본 border 적용
  function setEmpty(addr) {
    var c = ws.getCell(addr);
    c.fill = WHITE_FILL;
  }

  // B:G 각 컬럼 기본 left/right border (예시.xlsx 패턴)
  // B: L+R, C: L only, D: none, E: none, F: L only, G: R only
  var COL_BORDERS = {
    2: { left: T, right: T },  // B
    3: { left: T },            // C
    4: {},                     // D
    5: {},                     // E
    6: { left: T },            // F
    7: { right: T },           // G
  };
  function applyRowBorder(rowNum) {
    for (var col = 2; col <= 7; col++) {
      try {
        var c = ws.getRow(rowNum).getCell(col);
        var b = c.border ? JSON.parse(JSON.stringify(c.border)) : {};
        var add = COL_BORDERS[col] || {};
        if (add.left)  b.left  = T;
        if (add.right) b.right = T;
        c.border = b;
      } catch(e) {}
    }
  }

  // 과제 구분선: 해당 행 B:G 모두 top border
  function applyTopSep(rowNum) {
    for (var col = 2; col <= 7; col++) {
      try {
        var c = ws.getRow(rowNum).getCell(col);
        var b = c.border ? JSON.parse(JSON.stringify(c.border)) : {};
        b.top = T;
        c.border = b;
      } catch(e) {}
    }
  }

  // 섹션 끝: B:G bottom border
  function applyBottomSep(rowNum) {
    for (var col = 2; col <= 7; col++) {
      try {
        var c = ws.getRow(rowNum).getCell(col);
        var b = c.border ? JSON.parse(JSON.stringify(c.border)) : {};
        b.bottom = T;
        c.border = b;
      } catch(e) {}
    }
  }

  var row = 6;

  // ── 과제 ──
  for (var ti = 0; ti < data.tasks.length; ti++) {
    var task     = data.tasks[ti];
    var startRow = row;
    var curItems = task.currentWeekItems || [];
    var nxtItems = task.nextWeekItems    || [];
    var issues   = task.issues           || [];

    var dlPart = task.deadline
      ? '(~' + task.deadline.replace(/^(\d{4})-(\d{2})-(\d{2})$/, '$2/$3') + ', ' + (task.overallProgress || 0) + '%)'
      : '(' + (task.overallProgress || 0) + '%)';

    setVal('B' + row,       task.kpiProduct || '', { center: true });
    setVal('B' + (row + 1), dlPart,               { center: true });

    // C열: 금주활동 + 상세 + 이슈
    var cRow = row;
    for (var ci = 0; ci < curItems.length; ci++) {
      var item = curItems[ci];
      if (!item.text) continue;
      var line = ' - ' + item.text;
      if (item.progress !== '' && item.progress != null) line += ' (' + item.progress + '%)';
      setVal('C' + cRow, line); cRow++;
      var dets = (item.details || []).filter(function(d) { return d.text; });
      for (var di = 0; di < dets.length; di++) {
        setVal('C' + cRow, '   ' + dets[di].text); cRow++;
      }
    }
    if (issues.some(function(i) { return i.text; })) {
      setVal('C' + cRow, ' ※ 이슈사항'); cRow++;
      for (var ii = 0; ii < issues.length; ii++) {
        if (issues[ii].text) { setVal('C' + cRow, '  - ' + issues[ii].text); cRow++; }
      }
    }
    var cLast = Math.max(cRow - 1, row);

    // F열: 차주계획 + 상세
    var fRow = row;
    for (var ni = 0; ni < nxtItems.length; ni++) {
      var nitem = nxtItems[ni];
      if (!nitem.text) continue;
      var nline = ' - ' + nitem.text;
      if (nitem.progress !== '' && nitem.progress != null) nline += ' (' + nitem.progress + '%)';
      setVal('F' + fRow, nline); fRow++;
      var ndets = (nitem.details || []).filter(function(d) { return d.text; });
      for (var ndi = 0; ndi < ndets.length; ndi++) {
        setVal('F' + fRow, '   ' + ndets[ndi].text); fRow++;
      }
    }
    var fLast = Math.max(fRow - 1, row);

    var maxRow = Math.max(row + 1, cLast, fLast);

    // 모든 행에 L/R border
    for (var r = startRow; r <= maxRow; r++) applyRowBorder(r);
    // 과제 시작행 top border (구분선)
    applyTopSep(startRow);

    row = maxRow + 1;
  }

  // 마지막 과제 끝 bottom border
  if (row > 6) applyBottomSep(row - 1);

  // ── 운영/요청사항 ──
  var ops    = data.operations || [];
  var curOps = ops.filter(function(o) { return o.weekType !== 'next'; });
  var nxtOps = ops.filter(function(o) { return o.weekType === 'next'; });
  if (curOps.length > 0 || nxtOps.length > 0) {
    var opsStart = row;
    setVal('B' + row, '운영/요청 사항', { center: true });
    var cOps = row, fOps = row;
    for (var oi = 0; oi < curOps.length; oi++) {
      if (curOps[oi].text) { setVal('C' + cOps, ' - ' + curOps[oi].text); cOps++; }
    }
    for (var ofi = 0; ofi < nxtOps.length; ofi++) {
      if (nxtOps[ofi].text) { setVal('F' + fOps, ' - ' + nxtOps[ofi].text); fOps++; }
    }
    var opsMax = Math.max(cOps - 1, fOps - 1, row);
    for (var r2 = opsStart; r2 <= opsMax; r2++) applyRowBorder(r2);
    applyTopSep(opsStart);
    applyBottomSep(opsMax);
    row = opsMax + 1;
  }

  // ── 제품 배포 ──
  var deploys = data.deployments || [];
  if (deploys.length > 0) {
    // 3행 빈 행
    row += 3;

    // 배포 헤더 (B:G merged, dark fill)
    ws.getRow(row).height = 30;
    ws.mergeCells('B' + row + ':G' + row);
    var dh = ws.getCell('B' + row);
    dh.value     = '제품 배포';
    dh.fill      = HDR_FILL;
    dh.font      = HDR_FONT;
    dh.alignment = { horizontal: 'center', vertical: 'middle' };
    dh.border    = FULL;
    row++;

    for (var di2 = 0; di2 < deploys.length; di2++) {
      var dep = deploys[di2];
      // 서브 헤더 (gray fill) — B~E + F:G merged 진척
      ws.mergeCells('F' + row + ':G' + row);
      var subHdrs = { B: '제품', C: '차수', D: '배포기한', E: '건수(기능/오류)', F: '진척' };
      ['B','C','D','E','F'].forEach(function(col) {
        var hc = ws.getCell(col + row);
        hc.value     = subHdrs[col];
        hc.fill      = GRAY_FILL;
        hc.font      = DATA_FONT;
        hc.alignment = { horizontal: 'center', vertical: 'middle' };
        hc.border    = FULL;
      });
      row++;

      // 데이터 행: B~E full border (bottom 포함), F top+left (no right, no bottom), G top+left+right (no bottom)
      var feat = dep.counts ? (dep.counts.feature || 0) : 0;
      var bug  = dep.counts ? (dep.counts.bug     || 0) : 0;
      setVal('B' + row, dep.product    || '', { center: true });
      setVal('C' + row, dep.round      || '', { center: true });
      setVal('D' + row, dep.deployDate || '', { center: true });
      setVal('E' + row, (feat + bug) + '(' + feat + '/' + bug + ')', { center: true });
      setVal('F' + row, dep.progressText || '');
      // B(2)~E(5): top+left+right+bottom / F(6): top+left / G(7): top+right (G에 left 없어야 F-G 경계선 없음)
      var dataRowBorders = { 2:{top:T,left:T,right:T,bottom:T}, 3:{top:T,left:T,right:T,bottom:T},
                             4:{top:T,left:T,right:T,bottom:T}, 5:{top:T,left:T,right:T,bottom:T},
                             6:{top:T,left:T}, 7:{top:T,right:T} };
      for (var col = 2; col <= 7; col++) {
        try {
          var dc = ws.getRow(row).getCell(col);
          dc.border = dataRowBorders[col];
          if (!dc.fill || !dc.fill.fgColor) dc.fill = WHITE_FILL;
        } catch(e) {}
      }
      row++;

      // 레드마인/이슈 행 border: B(left), C/D(없음), E(right), F(left), G(right) — 완전 덮어쓰기
      function applySubRowBorder(rowNum) {
        var subBorders = { 2: {left:T}, 3: {}, 4: {}, 5: {right:T}, 6: {left:T}, 7: {right:T} };
        for (var sc = 2; sc <= 7; sc++) {
          try {
            var sbc = ws.getRow(rowNum).getCell(sc);
            sbc.border = subBorders[sc] || {};
          } catch(e) {}
        }
      }

      // 레드마인 항목 — B셀부터
      var rmItems = dep.redmineItems || [];
      for (var ri = 0; ri < rmItems.length; ri++) {
        if (rmItems[ri].text) {
          setVal('B' + row, ' # ' + rmItems[ri].text);
          applySubRowBorder(row);
          row++;
        }
      }
      // 이슈 — B셀부터
      if (dep.issues) {
        setVal('B' + row, ' ※ 이슈: ' + dep.issues);
        applySubRowBorder(row);
        row++;
      }
      applyBottomSep(row - 1);
    }
  }
}

// ── 팀 통합 시트: 전 팀원 과제/운영/배포를 개인 시트 포맷 그대로 순서대로 출력 ──
function buildTeamSheet(ws) {
  // 컬럼 너비 (개인 시트 동일)
  ws.getColumn(1).width = 9;
  ws.getColumn(2).width = 28;
  ws.getColumn(3).width = 16.83;
  ws.getColumn(4).width = 14;
  ws.getColumn(5).width = 24.33;
  ws.getColumn(6).width = 15.83;
  ws.getColumn(7).width = 34.25;
  ws.getColumn(8).width = 9;

  const HDR_FILL   = { type: 'pattern', pattern: 'solid', fgColor: { theme: 0, tint: -0.1499984740745262 }, bgColor: { indexed: 64 } };
  const GRAY_FILL  = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFF2F2F2' }, bgColor: { indexed: 64 } };
  const WHITE_FILL = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFFFFFFF' }, bgColor: { indexed: 64 } };
  const HDR_FONT   = { size: 10, name: 'GC120', color: { theme: 1 } };
  const DATA_FONT  = { size: 10, name: 'GC120', color: { theme: 1 } };
  const T = { style: 'thin', color: { indexed: 64 } };
  const FULL = { top: T, bottom: T, left: T, right: T };

  // 전체 셀 흰색 배경
  for (var wr = 1; wr <= 500; wr++) {
    for (var wc = 1; wc <= 21; wc++) {
      ws.getRow(wr).getCell(wc).fill = WHITE_FILL;
    }
  }

  // Row 4: 주간보고
  ws.getRow(4).height = 30;
  ws.mergeCells('B4:G4');
  var h4 = ws.getCell('B4');
  h4.value = '주간보고';
  h4.fill = HDR_FILL; h4.font = HDR_FONT;
  h4.alignment = { horizontal: 'center', vertical: 'middle' };
  h4.border = FULL;

  // Row 5: 컬럼 헤더
  ws.getRow(5).height = 30;
  ws.mergeCells('C5:E5');
  ws.mergeCells('F5:G5');
  function hdrCell(addr, text) {
    var c = ws.getCell(addr);
    c.value = text; c.fill = HDR_FILL; c.font = HDR_FONT;
    c.alignment = { horizontal: 'center', vertical: 'middle' };
    c.border = FULL;
  }
  hdrCell('B5', 'KPI/제품');
  hdrCell('C5', '금주활동');
  hdrCell('F5', '차주계획');

  function setVal(addr, val, opts) {
    if (val === null || val === undefined || val === '') return;
    var c = ws.getCell(addr);
    c.value = val; c.font = DATA_FONT; c.fill = WHITE_FILL;
    c.alignment = opts && opts.center
      ? { horizontal: 'center', vertical: 'middle', wrapText: false }
      : { vertical: 'top', wrapText: false };
  }
  var COL_BORDERS = { 2:{left:T,right:T}, 3:{left:T}, 4:{}, 5:{}, 6:{left:T}, 7:{right:T} };
  function applyRowBorder(rowNum) {
    for (var col = 2; col <= 7; col++) {
      try {
        var c = ws.getRow(rowNum).getCell(col);
        var b = c.border ? JSON.parse(JSON.stringify(c.border)) : {};
        var add = COL_BORDERS[col] || {};
        if (add.left)  b.left  = T;
        if (add.right) b.right = T;
        c.border = b;
      } catch(e) {}
    }
  }
  function applyTopSep(rowNum) {
    for (var col = 2; col <= 7; col++) {
      try {
        var c = ws.getRow(rowNum).getCell(col);
        var b = c.border ? JSON.parse(JSON.stringify(c.border)) : {};
        b.top = T; c.border = b;
      } catch(e) {}
    }
  }
  function applyBottomSep(rowNum) {
    for (var col = 2; col <= 7; col++) {
      try {
        var c = ws.getRow(rowNum).getCell(col);
        var b = c.border ? JSON.parse(JSON.stringify(c.border)) : {};
        b.bottom = T; c.border = b;
      } catch(e) {}
    }
  }
  function applySubRowBorder(rowNum) {
    var subBorders = { 2:{left:T}, 3:{}, 4:{}, 5:{right:T}, 6:{left:T}, 7:{right:T} };
    for (var sc = 2; sc <= 7; sc++) {
      try {
        var sbc = ws.getRow(rowNum).getCell(sc);
        sbc.border = subBorders[sc] || {};
      } catch(e) {}
    }
  }

  var row = 6;
  var hasAnyTask = false;

  // ── 모든 팀원 과제 ──
  for (var mi = 0; mi < state.meta.members.length; mi++) {
    var data = getMemberData(state.meta.members[mi].id);
    for (var ti = 0; ti < data.tasks.length; ti++) {
      hasAnyTask = true;
      var task = data.tasks[ti];
      var startRow = row;
      var curItems = task.currentWeekItems || [];
      var nxtItems = task.nextWeekItems    || [];
      var issues   = task.issues           || [];

      var dlPart = task.deadline
        ? '(~' + task.deadline.replace(/^(\d{4})-(\d{2})-(\d{2})$/, '$2/$3') + ', ' + (task.overallProgress || 0) + '%)'
        : '(' + (task.overallProgress || 0) + '%)';

      setVal('B' + row, task.kpiProduct || '', { center: true });
      setVal('B' + (row + 1), dlPart, { center: true });

      var cRow = row;
      for (var ci = 0; ci < curItems.length; ci++) {
        var item = curItems[ci];
        if (!item.text) continue;
        var line = ' - ' + item.text;
        if (item.progress !== '' && item.progress != null) line += ' (' + item.progress + '%)';
        setVal('C' + cRow, line); cRow++;
        var dets = (item.details || []).filter(function(d) { return d.text; });
        for (var di = 0; di < dets.length; di++) {
          setVal('C' + cRow, '   ' + dets[di].text); cRow++;
        }
      }
      if (issues.some(function(i) { return i.text; })) {
        setVal('C' + cRow, ' ※ 이슈사항'); cRow++;
        for (var ii = 0; ii < issues.length; ii++) {
          if (issues[ii].text) { setVal('C' + cRow, '  - ' + issues[ii].text); cRow++; }
        }
      }
      var cLast = Math.max(cRow - 1, row);

      var fRow = row;
      for (var ni = 0; ni < nxtItems.length; ni++) {
        var nitem = nxtItems[ni];
        if (!nitem.text) continue;
        var nline = ' - ' + nitem.text;
        if (nitem.progress !== '' && nitem.progress != null) nline += ' (' + nitem.progress + '%)';
        setVal('F' + fRow, nline); fRow++;
        var ndets = (nitem.details || []).filter(function(d) { return d.text; });
        for (var ndi = 0; ndi < ndets.length; ndi++) {
          setVal('F' + fRow, '   ' + ndets[ndi].text); fRow++;
        }
      }
      var fLast = Math.max(fRow - 1, row);
      var maxRow = Math.max(row + 1, cLast, fLast);

      for (var r = startRow; r <= maxRow; r++) applyRowBorder(r);
      applyTopSep(startRow);
      row = maxRow + 1;
    }
  }
  if (hasAnyTask) applyBottomSep(row - 1);

  // ── 모든 팀원 운영/요청사항 취합 ──
  var allCurOps = [], allNxtOps = [];
  for (var mo = 0; mo < state.meta.members.length; mo++) {
    var opsData = getMemberData(state.meta.members[mo].id).operations || [];
    allCurOps = allCurOps.concat(opsData.filter(function(o) { return o.weekType !== 'next'; }));
    allNxtOps = allNxtOps.concat(opsData.filter(function(o) { return o.weekType === 'next'; }));
  }
  if (allCurOps.length > 0 || allNxtOps.length > 0) {
    var opsStart = row;
    setVal('B' + row, '운영/요청 사항', { center: true });
    var cOps = row, fOps = row;
    for (var oi = 0; oi < allCurOps.length; oi++) {
      if (allCurOps[oi].text) { setVal('C' + cOps, ' - ' + allCurOps[oi].text); cOps++; }
    }
    for (var ofi = 0; ofi < allNxtOps.length; ofi++) {
      if (allNxtOps[ofi].text) { setVal('F' + fOps, ' - ' + allNxtOps[ofi].text); fOps++; }
    }
    var opsMax = Math.max(cOps - 1, fOps - 1, row);
    for (var r2 = opsStart; r2 <= opsMax; r2++) applyRowBorder(r2);
    applyTopSep(opsStart);
    applyBottomSep(opsMax);
    row = opsMax + 1;
  }

  // ── 모든 팀원 배포 ──
  var allDeploys = [];
  for (var md = 0; md < state.meta.members.length; md++) {
    allDeploys = allDeploys.concat(getMemberData(state.meta.members[md].id).deployments || []);
  }
  if (allDeploys.length > 0) {
    row += 3;
    ws.getRow(row).height = 30;
    ws.mergeCells('B' + row + ':G' + row);
    var dh = ws.getCell('B' + row);
    dh.value = '제품 배포';
    dh.fill = HDR_FILL; dh.font = HDR_FONT;
    dh.alignment = { horizontal: 'center', vertical: 'middle' };
    dh.border = FULL;
    row++;

    for (var di2 = 0; di2 < allDeploys.length; di2++) {
      var dep = allDeploys[di2];
      ws.mergeCells('F' + row + ':G' + row);
      var subHdrs = { B:'제품', C:'차수', D:'배포기한', E:'건수(기능/오류)', F:'진척' };
      ['B','C','D','E','F'].forEach(function(col) {
        var hc = ws.getCell(col + row);
        hc.value = subHdrs[col]; hc.fill = GRAY_FILL; hc.font = DATA_FONT;
        hc.alignment = { horizontal: 'center', vertical: 'middle' };
        hc.border = FULL;
      });
      row++;
      var feat = dep.counts ? (dep.counts.feature || 0) : 0;
      var bug  = dep.counts ? (dep.counts.bug     || 0) : 0;
      setVal('B' + row, dep.product    || '', { center: true });
      setVal('C' + row, dep.round      || '', { center: true });
      setVal('D' + row, dep.deployDate || '', { center: true });
      setVal('E' + row, (feat + bug) + '(' + feat + '/' + bug + ')', { center: true });
      setVal('F' + row, dep.progressText || '');
      var drborders = { 2:{top:T,left:T,right:T,bottom:T}, 3:{top:T,left:T,right:T,bottom:T},
                        4:{top:T,left:T,right:T,bottom:T}, 5:{top:T,left:T,right:T,bottom:T},
                        6:{top:T,left:T}, 7:{top:T,right:T} };
      for (var col = 2; col <= 7; col++) {
        try { ws.getRow(row).getCell(col).border = drborders[col]; } catch(e) {}
      }
      row++;
      var rmItems = dep.redmineItems || [];
      for (var ri = 0; ri < rmItems.length; ri++) {
        if (rmItems[ri].text) {
          setVal('B' + row, ' # ' + rmItems[ri].text);
          applySubRowBorder(row); row++;
        }
      }
      if (dep.issues) {
        setVal('B' + row, ' ※ 이슈: ' + dep.issues);
        applySubRowBorder(row); row++;
      }
      applyBottomSep(row - 1);
    }
  }
}

// ============================================================
// TEAM VIEW
// ============================================================
function getMemberAvgProgress(memberId) {
  const tasks = getMemberData(memberId).tasks || [];
  if (!tasks.length) return null;
  const sum = tasks.reduce((a, t) => a + (t.overallProgress || 0), 0);
  return Math.round(sum / tasks.length);
}

function getTeamCounts() {
  let totalTasks = 0, issueTasks = 0, totalDeploys = 0;
  for (const m of state.meta.members) {
    const d = getMemberData(m.id);
    totalTasks  += (d.tasks || []).length;
    issueTasks  += (d.tasks || []).filter(t => (t.issues || []).some(i => i.text)).length;
    totalDeploys += (d.deployments || []).length;
  }
  return { totalTasks, issueTasks, totalDeploys };
}

function renderTeamSummaryMetrics() {
  const rows = state.meta.members.map(m => {
    const pct = getMemberAvgProgress(m.id);
    const display = pct === null ? '—' : pct + '%';
    const bar = pct === null ? '<div class="team-progress-bg"></div>' :
      `<div class="team-progress-bg"><div class="team-progress-fill" style="width:${pct}%"></div></div>`;
    return `<div class="team-member-progress">
      <span class="team-member-name">${esc(m.name)}</span>
      ${bar}
      <span class="team-progress-pct">${display}</span>
    </div>`;
  }).join('');
  return `<div class="team-progress-list">${rows}</div>`;
}

function renderTeamCountCards() {
  const { totalTasks, issueTasks, totalDeploys } = getTeamCounts();
  return `<div class="team-count-cards">
    <div class="team-count-card">
      <span class="team-count-label">전체 과제</span>
      <span class="team-count-num">${totalTasks}</span>
    </div>
    <div class="team-count-card warn">
      <span class="team-count-label">이슈 과제</span>
      <span class="team-count-num">${issueTasks}</span>
    </div>
    <div class="team-count-card">
      <span class="team-count-label">배포 건수</span>
      <span class="team-count-num">${totalDeploys}</span>
    </div>
  </div>`;
}

function renderTeamCardView() {
  const cards = state.meta.members.map(m => {
    const data = getMemberData(m.id);
    const pct = getMemberAvgProgress(m.id);
    const issueCount = (data.tasks || []).filter(t => (t.issues || []).some(i => i.text)).length;
    const taskRows = (data.tasks || []).length
      ? (data.tasks || []).map(t =>
          `<div class="team-card-task">
            <span class="team-card-kpi">${esc(t.kpiProduct || '(미입력)')}</span>
            <span class="team-card-pct">${t.overallProgress || 0}%</span>
          </div>`).join('')
      : '<div class="team-card-empty">과제 없음</div>';

    const collapsed = _teamCardCollapsed.has(m.id);
    return `<div class="team-card${collapsed ? ' collapsed' : ''}" data-member="${m.id}">
      <div class="team-card-header" onclick="toggleTeamCard('${m.id}')">
        <span class="team-card-name" onclick="event.stopPropagation();switchTab('${m.id}')">${esc(m.name)}</span>
        <span class="team-card-division">${esc(m.division || '')}</span>
        ${issueCount > 0 ? `<span class="team-card-issue-badge">⚠ ${issueCount}</span>` : ''}
        <svg class="team-card-chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <div class="team-card-body">
        <div class="team-card-tasks">${taskRows}</div>
        ${pct !== null ? `
          <div class="team-card-footer">
            <div class="team-progress-bg" style="flex:1"><div class="team-progress-fill" style="width:${pct}%"></div></div>
            <span class="team-progress-pct">${pct}%</span>
          </div>` : ''}
      </div>
    </div>`;
  }).join('');
  return `<div class="team-card-grid">${cards}</div>`;
}

function renderTeamTableView() {
  const rows = [];
  for (const m of state.meta.members) {
    const data = getMemberData(m.id);
    const tasks = data.tasks || [];
    if (!tasks.length) {
      rows.push(`<tr class="team-table-row">
        <td class="team-td-member">${esc(m.name)}</td>
        <td colspan="5" style="color:var(--text-muted);font-size:13px;padding:10px 14px;">과제 없음</td>
      </tr>`);
      continue;
    }
    tasks.forEach((t, ti) => {
      function renderActivityCell(items) {
        return (items || []).filter(i => i.text).map(i => {
          const details = (i.details || []).filter(d => d.text);
          const detailHtml = details.length
            ? '<ul class="team-detail-list">' + details.map(d => `<li>${esc(d.text)}</li>`).join('') + '</ul>'
            : '';
          return `<div style="margin-bottom:${details.length?'6':'0'}px">• ${esc(i.text)}${detailHtml}</div>`;
        }).join('');
      }
      const issueText = (t.issues || []).filter(i => i.text).map(i => i.text).join('\n');
      rows.push(`<tr class="team-table-row${issueText ? ' has-issue' : ''}">
        ${ti === 0 ? `<td class="team-td-member" rowspan="${tasks.length}">${esc(m.name)}</td>` : ''}
        <td class="team-td team-td-kpi" style="display:flex;align-items:center;gap:4px;">
          <span contenteditable="true"
            data-member="${m.id}" data-task="${t.id}" data-field="kpiProduct"
            onblur="updateTaskCEField(this);renderMain();"
            style="flex:1;min-width:0;">${esc(t.kpiProduct || '')}</span>
          <button class="fav-btn${isFav('task',m.id,t.id)?' active':''}"
            onclick="toggleFav('task','${m.id}','${t.id}')" title="즐겨찾기">★</button>
        </td>
        <td class="team-td team-td-activity">${renderActivityCell(t.currentWeekItems)}</td>
        <td class="team-td team-td-activity">${renderActivityCell(t.nextWeekItems)}</td>
        <td class="team-td team-td-pct" style="font-weight:600;color:var(--primary);">
          ${t.overallProgress || 0}%
        </td>
        <td class="team-td team-td-issue${issueText ? ' issue-cell' : ''}">${esc(issueText)}</td>
      </tr>`);
    });
  }
  return `<div class="team-table-wrap">
    <table class="team-table">
      <thead><tr>
        <th>담당자</th><th>KPI / 제품</th><th>금주활동</th>
        <th>차주계획</th><th>진척율</th><th>이슈</th>
      </tr></thead>
      <tbody>${rows.join('')}</tbody>
    </table>
  </div>`;
}

// FAVORITES
// ============================================================
function favKey(type, memberId, id) { return `${type}|${memberId}|${id}`; }
function isFav(type, memberId, id) {
  return (state.favorites || []).some(f => f.type === type && f.memberId === memberId && f.id === id);
}
function toggleFav(type, memberId, id) {
  if (!state.favorites) state.favorites = [];
  const idx = state.favorites.findIndex(f => f.type === type && f.memberId === memberId && f.id === id);
  if (idx >= 0) state.favorites.splice(idx, 1);
  else state.favorites.push({ type, memberId, id });
  saveState();
  renderMain();
}
function removeFav(type, memberId, id) {
  if (!state.favorites) return;
  state.favorites = state.favorites.filter(f => !(f.type === type && f.memberId === memberId && f.id === id));
  _favExpanded.delete(`${type}|${memberId}|${id}`);
  saveState();
  renderMain();
}

const _favExpanded = new Set();
function toggleFavDetail(type, memberId, id) {
  const k = `${type}|${memberId}|${id}`;
  if (_favExpanded.has(k)) _favExpanded.delete(k);
  else _favExpanded.add(k);
  const detail = document.querySelector(`.fav-card[data-fav="${k}"] .fav-card-detail`);
  const btn    = document.querySelector(`.fav-card[data-fav="${k}"] .fav-card-toggle`);
  if (detail) detail.classList.toggle('open', _favExpanded.has(k));
  if (btn)    btn.textContent = _favExpanded.has(k) ? '접기 ▲' : '펼치기 ▼';
}

function renderFavCards() {
  if (!state.favorites || !state.favorites.length) return '';
  const cards = state.favorites.map(f => {
    const k = `${f.type}|${f.memberId}|${f.id}`;
    const member = getMember(f.memberId);
    const mName = member ? esc(member.name) : '';
    const isOpen = _favExpanded.has(k);
    const actions = `
      <div class="fav-card-actions">
        <button class="fav-card-toggle" onclick="toggleFavDetail('${f.type}','${f.memberId}','${f.id}')">${isOpen ? '접기 ▲' : '펼치기 ▼'}</button>
        <button class="fav-card-remove" onclick="removeFav('${f.type}','${f.memberId}','${f.id}')" title="즐겨찾기 해제">✕</button>
      </div>`;

    if (f.type === 'task') {
      const task = (getMemberData(f.memberId).tasks || []).find(t => t.id === f.id);
      if (!task) return '';
      const pct = task.overallProgress || 0;
      const currentItems = (task.currentWeekItems || []).filter(i => i.text);
      const nextItems    = (task.nextWeekItems    || []).filter(i => i.text);
      const issues       = (task.issues           || []).filter(i => i.text);
      const mkList = items => items.length
        ? `<ul class="fav-detail-list">${items.map(i => `<li>${esc(i.text)}</li>`).join('')}</ul>`
        : `<span class="fav-detail-empty">없음</span>`;
      return `<div class="fav-card" data-fav="${k}">
        <div class="fav-card-header">
          <div class="fav-card-header-left">
            <div class="fav-card-type">KPI / 제품</div>
            <div class="fav-card-title" title="${esc(task.kpiProduct || '')}">${esc(task.kpiProduct || '(미입력)')}</div>
          </div>
          ${actions}
        </div>
        <div class="fav-card-meta">${mName} · ~${esc(task.deadline || '-')}</div>
        <div class="fav-card-bar">
          <div class="team-progress-bg" style="flex:1"><div class="team-progress-fill" style="width:${pct}%"></div></div>
          <span class="team-progress-pct">${pct}%</span>
        </div>
        <div class="fav-card-detail${isOpen ? ' open' : ''}">
          <div class="fav-detail-section">
            <div class="fav-detail-label">금주활동</div>${mkList(currentItems)}
          </div>
          <div class="fav-detail-section">
            <div class="fav-detail-label">차주계획</div>${mkList(nextItems)}
          </div>
          ${issues.length ? `<div class="fav-detail-section">
            <div class="fav-detail-label">이슈</div>${mkList(issues)}
          </div>` : ''}
        </div>
      </div>`;
    } else if (f.type === 'deploy') {
      const dep = (getMemberData(f.memberId).deployments || []).find(d => d.id === f.id);
      if (!dep) return '';
      const feat = dep.counts ? (dep.counts.feature || 0) : 0;
      const bug  = dep.counts ? (dep.counts.bug  || 0) : 0;
      const rmItems = (dep.redmineItems || []).filter(r => r.text);
      const mkList = items => items.length
        ? `<ul class="fav-detail-list">${items.map(i => `<li>${esc(i.text)}</li>`).join('')}</ul>`
        : `<span class="fav-detail-empty">없음</span>`;
      return `<div class="fav-card" data-fav="${k}">
        <div class="fav-card-header">
          <div class="fav-card-header-left">
            <div class="fav-card-type">제품 배포</div>
            <div class="fav-card-title" title="${esc(dep.product || '')}">${esc(dep.product || '(미입력)')} ${esc(dep.round || '')}</div>
          </div>
          ${actions}
        </div>
        <div class="fav-card-meta">${mName} · ${esc(dep.deployDate || '-')} · ${feat+bug}건(${feat}/${bug})</div>
        <div class="fav-card-bar" style="font-size:12px;color:var(--text-secondary);">
          ${esc(dep.progressText || '—')}
        </div>
        <div class="fav-card-detail${isOpen ? ' open' : ''}">
          <div class="fav-detail-section">
            <div class="fav-detail-label">레드마인</div>${mkList(rmItems)}
          </div>
          ${dep.issues ? `<div class="fav-detail-section">
            <div class="fav-detail-label">이슈</div>
            <div class="fav-detail-list" style="padding-left:0;">${esc(dep.issues)}</div>
          </div>` : ''}
        </div>
      </div>`;
    }
    return '';
  }).filter(Boolean).join('');
  if (!cards) return '';
  return `<div class="fav-cards">${cards}</div>`;
}

// ============================================================
// NOTIFICATIONS
// ============================================================
const NOTIF_KEY  = 'weekly_notifications';
const NOTIF_MAX  = 50;
const NOTIF_SHOW = 20;

let _notifications = [];

function loadNotifications() {
  try {
    _notifications = JSON.parse(localStorage.getItem(NOTIF_KEY) || '[]');
  } catch(e) {
    _notifications = [];
  }
}

function saveNotifications() {
  localStorage.setItem(NOTIF_KEY, JSON.stringify(_notifications));
}

const NOTIF_ICONS = {
  task_add:       '📋',
  task_delete:    '🗑',
  status_done:    '✅',
  status_editing: '✏️',
  ai_edit:        '🤖',
};

function pushNotification(type, memberId, memberName, extraLabel) {
  const labels = {
    task_add:       `${memberName} · 과제 추가${extraLabel ? ': ' + extraLabel : ''}`,
    task_delete:    `${memberName} · 과제 삭제${extraLabel ? ': ' + extraLabel : ''}`,
    status_done:    `${memberName} → 작성완료`,
    status_editing: `${memberName} → 수정 중`,
    ai_edit:        `AI · ${memberName} · ${extraLabel || '수정'}`,
  };
  const notif = {
    id:         generateId(),
    type,
    memberId,
    memberName,
    message:    labels[type] || type,
    createdAt:  Date.now(),
    read:       false,
  };
  _notifications.unshift(notif);
  if (_notifications.length > NOTIF_MAX) _notifications = _notifications.slice(0, NOTIF_MAX);
  saveNotifications();
  updateNotifBadge();
}

function updateNotifBadge() {
  const badge = document.getElementById('notifBadge');
  if (!badge) return;
  const count = _notifications.filter(n => !n.read).length;
  badge.textContent = count > 0 ? (count > 9 ? '9+' : count) : '';
  badge.style.display = count > 0 ? 'flex' : 'none';
}

function markAllRead() {
  _notifications.forEach(n => n.read = true);
  saveNotifications();
  updateNotifBadge();
}

function formatRelativeTime(ts) {
  const diff = Date.now() - ts;
  const mins  = Math.floor(diff / 60000);
  const hours = Math.floor(diff / 3600000);
  const days  = Math.floor(diff / 86400000);
  if (diff < 60000)   return '방금 전';
  if (mins  < 60)     return `${mins}분 전`;
  if (hours < 24)     return `${hours}시간 전`;
  return `${days}일 전`;
}

function renderNotificationBell() {
  const count = _notifications.filter(n => !n.read).length;
  const badge = count > 0
    ? `<span id="notifBadge" class="notif-badge" style="display:flex">${count > 9 ? '9+' : count}</span>`
    : `<span id="notifBadge" class="notif-badge" style="display:none"></span>`;
  return `
    <div class="notif-wrap">
      <button class="notif-bell-btn" onclick="toggleNotificationPanel(event)" title="알림">
        🔔${badge}
      </button>
    </div>`;
}

function renderNotificationPanel() {
  const panel = document.getElementById('notifPanel');
  if (!panel) return;
  const items = _notifications.slice(0, NOTIF_SHOW);
  const unreadCount = _notifications.filter(n => !n.read).length;

  const itemsHtml = items.length === 0
    ? '<div class="notif-empty">최근 알림 없음</div>'
    : items.map(n => `
        <div class="notif-item${n.read ? '' : ' unread'}">
          <span class="notif-item-icon">${NOTIF_ICONS[n.type] || '🔔'}</span>
          <div class="notif-item-body">
            <div class="notif-item-msg">${esc(n.message)}</div>
            <div class="notif-item-time">${formatRelativeTime(n.createdAt)}</div>
          </div>

function applyNukki(imgEl) {
  /* Canvas로 흰 배경 제거 (누끼) */
  try {
    const c = document.createElement('canvas');
    c.width  = imgEl.naturalWidth  || imgEl.width;
    c.height = imgEl.naturalHeight || imgEl.height;
    const ctx = c.getContext('2d');
    ctx.drawImage(imgEl, 0, 0);
    const id = ctx.getImageData(0, 0, c.width, c.height);
    const d  = id.data;
    for (let i = 0; i < d.length; i += 4) {
      /* 흰색에 가까운 픽셀(R>235, G>235, B>235) → 투명 처리 */
      if (d[i] > 235 && d[i+1] > 235 && d[i+2] > 235) {
        const brightness = (d[i] + d[i+1] + d[i+2]) / 3;
        d[i+3] = Math.round(Math.max(0, (255 - brightness) * 1.8));
      }
    }
    ctx.putImageData(id, 0, 0);
    imgEl.src = c.toDataURL('image/png');
    imgEl.closest('.landing-logo-wrap')?.classList.add('nukki-done');
  } catch(e) {
    /* 보안 정책으로 canvas 접근 불가 시 fallback — 스타일 유지 */
    console.log('[nukki] fallback (canvas tainted):', e.message);
  }
}

function confirmAddMember() {
  const name = (document.getElementById('newMemberName')?.value || '').trim();
  const division = '기타';
  if (!name) { document.getElementById('newMemberName')?.focus(); return; }
  if (state.meta.members.some(m => m.name === name)) {
    showToast('이미 있는 팀원 이름입니다.');

  }
  const id = name.replace(/\s+/g, '_') + '_' + Date.now().toString(36);

  state.activeTab = id;

  closeAddMemberModal();
  renderSidebar();
  renderMain();
  showToast('✓ ' + name + ' 팀원이 추가되었습니다.');

function removeMember(id, event) {
  event.stopPropagation();
  const member = getMember(id);
  if (!member) return;
  if (!confirm(member.name + ' 팀원을 삭제하시겠습니까? 데이터도 함께 삭제됩니다.')) return;
  state.meta.members = state.meta.members.filter(function(m) { return m.id !== id; });
  delete state.members[id];
  if (state.activeTab === id) {
    state.activeTab = state.meta.members[0] ? state.meta.members[0].id : '';
  }
  saveState();
  renderSidebar();
  renderMain();
  showToast(member.name + ' 팀원이 삭제되었습니다.');
}

// buildChatContext: 팀 데이터 → 마크다운 텍스트
function buildChatContext() {
  const lines = [];
  for (const m of state.meta.members) {
    const data = getMemberData(m.id);
    lines.push(`[${m.name}] (ID: ${m.id})`);
    if (!data.tasks.length) {
      lines.push('과제: (없음)');
    } else {
      data.tasks.forEach((t, ti) => {
        const dl = t.deadline ? `, ~${t.deadline}` : '';
        lines.push(`과제 ${ti + 1}: "${t.kpiProduct || '(미입력)'}" (ID: ${t.id}, 진척 ${t.overallProgress || 0}%${dl})`);
        const cur = (t.currentWeekItems || []).filter(i => i.text);
        lines.push('  금주활동:' + (cur.length ? '' : ' (없음)'));
        cur.forEach(i => {
          lines.push(`    - ${i.text}${i.progress != null && i.progress !== '' ? ` (${i.progress}%)` : ''} (ID: ${i.id})`);
          (i.details || []).filter(d => d.text).forEach(d => lines.push(`      · ${d.text} (ID: ${d.id})`));
        });
        const nxt = (t.nextWeekItems || []).filter(i => i.text);
        lines.push('  차주계획:' + (nxt.length ? '' : ' (없음)'));
        nxt.forEach(i => {
          lines.push(`    - ${i.text}${i.progress != null && i.progress !== '' ? ` (${i.progress}%)` : ''} (ID: ${i.id})`);
          (i.details || []).filter(d => d.text).forEach(d => lines.push(`      · ${d.text} (ID: ${d.id})`));
        });
        const iss = (t.issues || []).filter(i => i.text);
        lines.push('  이슈:' + (iss.length ? '' : ' (없음)'));
        iss.forEach(i => lines.push(`    - ${i.text} (ID: ${i.id})`));
      });
    }
    const ops = (data.operations || []).filter(o => o.text);
    lines.push('운영/요청:' + (ops.length ? '' : ' (없음)'));
    ops.forEach(o => lines.push(`  - [${o.weekType === 'next' ? '차주' : '금주'}] ${o.text} (ID: ${o.id})`));
    const deps = (data.deployments || []).filter(d => d.product);
    if (deps.length) {
      lines.push('배포:');
      deps.forEach(d => {
        const feat = d.counts ? (d.counts.feature || 0) : 0;
        const bug  = d.counts ? (d.counts.bug     || 0) : 0;
        lines.push(`  - ${d.product} ${d.round || ''} ~${d.deployDate || '미정'} 기능:${feat}/오류:${bug} ${d.progressText || ''} (ID: ${d.id})`);
        if (d.issues) lines.push(`    이슈: ${d.issues}`);
      });
    }
    lines.push('');
  }
  return lines.join('\n');
}

          product:      { type: 'string', description: '제품명 (ID 불확실 시 보조 식별자)' },
        }},
    },
    {
      name: 'add_task',
      description: '팀원에게 새 과제(KPI/제품)를 추가합니다. 과제명(kpiProduct)은 반드시 확인 후 호출하세요. 사용자가 큰따옴표로 과제명을 명시한 경우 즉시 호출하세요.',
      input_schema: { type: 'object', required: ['memberId','kpiProduct'],
        properties: {
          memberId:        { type: 'string', description: '팀원 ID' },
          kpiProduct:      { type: 'string', description: 'KPI/제품명' },
          division:        { type: 'string', description: '사업부문 (선택)' },
          deadline:        { type: 'string', description: '마감일 YYYY-MM-DD (선택)' },
          overallProgress: { type: 'number', description: '전체 진척률 0-100 (선택, 기본 0)' },
        }},
    },
    {
      name: 'delete_task',
      description: '팀원의 과제(KPI/제품)를 삭제합니다. taskId는 context의 (ID: ...) 값을 그대로 복사하세요.',
      input_schema: { type: 'object', required: ['memberId','taskId'],
        properties: {
          memberId:   { type: 'string', description: '팀원 ID' },
          taskId:     { type: 'string', description: '삭제할 과제 ID — context의 (ID: ...) 값 그대로 복사' },
          kpiProduct: { type: 'string', description: '과제명 (ID 불확실 시 보조 식별자)' },
        }},
    },
    {
      name: 'delete_detail',
      description: '활동 항목의 상세내용(하위 세부 항목)을 삭제합니다. detailId는 context의 (ID: ...) 값을 그대로 복사하세요.',
      input_schema: { type: 'object', required: ['memberId','taskId','weekType','itemId','detailId'],
        properties: {
          memberId:     { type: 'string', description: '팀원 ID' },
          taskId:       { type: 'string', description: '과제 ID' },
          weekType:     { type: 'string', enum: ['current','next'] },
          itemId:       { type: 'string', description: '상위 활동 항목 ID' },
          detailId:     { type: 'string', description: '삭제할 상세 항목 ID — context의 (ID: ...) 값 그대로 복사' },
          originalText: { type: 'string', description: '삭제할 상세 내용 텍스트 (ID로 찾을 수 없을 때 fallback)' },
        }},
    },
    {
      name: 'update_detail',
      description: '활동 항목의 상세내용(하위 세부 항목)을 수정합니다. detailId는 context의 (ID: ...) 값을 그대로 복사하세요. 사용자가 큰따옴표로 새 내용을 명시한 경우 즉시 호출하세요.',
      input_schema: { type: 'object', required: ['memberId','taskId','weekType','itemId','detailId','text'],
        properties: {
          memberId:     { type: 'string', description: '팀원 ID' },
          taskId:       { type: 'string', description: '과제 ID' },
          weekType:     { type: 'string', enum: ['current','next'] },
          itemId:       { type: 'string', description: '상위 활동 항목 ID' },
          detailId:     { type: 'string', description: '수정할 상세 항목 ID — context의 (ID: ...) 값 그대로 복사' },
          text:         { type: 'string', description: '새 상세 내용' },
          originalText: { type: 'string', description: '수정 전 상세 내용 텍스트 (ID로 찾을 수 없을 때 fallback)' },
        }},
    },
  ];
}

// ── 메시지 전송 ──
async function sendChatMessage() {
  const key = window.CLAUDE_API_KEY || '';

  const ta = document.getElementById('chatTextarea');
  const text = ta.value.trim();
  if (!text) return;
  ta.value = '';

  if (!state.chatMessages) state.chatMessages = [];
  state.chatMessages.push({ role: 'user', content: text });
  _trimChatHistory();
  saveState();
  renderChatMessages();
  _trySwitchTabByName(text);

  const btn = document.getElementById('chatSendBtn');
  btn.disabled = true; btn.style.opacity = '0.4';
  _appendLoadingMsg();

  try {
    const systemPrompt =
      `당신은 전략개발팀 주간업무보고 어시스턴트입니다.\n` +
      `현재 보고기간: ${state.meta.year}년 ${state.meta.month}월 ${state.meta.week}주차\n\n` +
      `아래는 팀 전체 데이터입니다:\n${buildChatContext()}\n\n` +
      `[tool 사용 규칙]\n` +
      `- 추가/수정/삭제 요청 시 필요한 정보가 context와 사용자 메시지에서 모두 파악되면 즉시 tool을 호출하세요. 설명·요약·확인 텍스트를 먼저 출력하지 마세요.\n` +
      `- 정보가 부족하면 tool 호출 전에 먼저 질문하세요. 빈 값으로 tool을 호출하지 마세요.\n` +
      `- 단, 위 데이터에 이미 존재하는 정보(과제 ID, 항목 ID, 팀원 ID 등)는 사용자에게 재확인하지 말고 context에서 직접 찾아 사용하세요.\n` +
      `- add_deployment: 제품명은 반드시 확인. 차수/기한/진척은 모르면 빈 문자열.\n` +
      `- add_activity / add_detail / add_operation: 큰따옴표로 내용이 명시된 경우 즉시 tool을 호출하세요. progress 등 선택 항목이 없으면 묻지 말고 빈 값으로 진행하세요.\n` +
      `- add_task: kpiProduct가 큰따옴표로 명시된 경우 즉시 tool을 호출하세요. deadline 등 선택 항목은 정보가 없으면 빈 값(또는 0)으로 진행하고 묻지 마세요.\n` +
      `- update_task_meta / update_activity / update_operation: 변경할 내용이 사용자 메시지에 명시된 경우 확인 없이 즉시 tool을 호출하세요. memberId·taskId·itemId 등 ID는 context에서 직접 찾아 사용하세요. 재확인 질문 금지.\n` +
      `- update_activity: itemId는 context의 (ID: ...) 값 그대로 복사. originalText에도 현재 항목 텍스트를 함께 전달하세요 (fallback 용도).\n` +
      `- 삭제: context에서 ID로 특정 가능하면 확인 없이 즉시 tool을 호출하세요. 별도 확인 질문 금지.\n` +
      `- delete_activity: itemId는 context (ID: ...) 값 그대로 복사. itemText에도 삭제할 항목 텍스트를 함께 전달하세요 (fallback 용도).\n` +
      `- delete_issue: issueId는 context (ID: ...) 값 그대로 복사. issueText에도 삭제할 이슈 텍스트를 함께 전달하세요 (fallback 용도).\n` +
      `- add_deployment는 deploymentId 없이 새로 만드는 tool이므로 ID 없다는 이유로 거절하지 마세요.\n` +
      `[tool 목록]\n` +
      `add_activity | update_activity | add_detail | update_detail | update_task_meta | add_issue\n` +
      `add_operation | update_operation | add_deployment | update_deployment\n` +
      `delete_activity | delete_detail | delete_issue | delete_operation | delete_deployment\n` +
      `add_task | delete_task`;

    // API 메시지 구성: user로 시작, 빈 content 제거
    const apiMessages = state.chatMessages
      .filter(m => m.content && m.content.trim())   // 빈 content 제거 (tool-only 응답 등)
      .filter((m, i, arr) => {                       // user로 시작하도록 앞쪽 assistant 제거
        const firstUser = arr.findIndex(x => x.role === 'user');
        return i >= firstUser;
      })
      .map(m => ({ role: m.role, content: m.content }));

    console.log('[chat] sending', apiMessages.length, 'messages, chatMessages total:', state.chatMessages.length);

    const useProxy = !key || key.startsWith('sk-ant-여기에');
    const endpoint = useProxy ? '/api/claude' : 'https://api.anthropic.com/v1/messages';
    const headers = useProxy
      ? { 'content-type': 'application/json' }
      : { 'x-api-key': key, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true', 'content-type': 'application/json' };

    const res = await fetch(endpoint, {
      method: 'POST',
      headers,
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 1024,
        system: systemPrompt,
        tools: getChatTools(),
        messages: apiMessages,
      }),
    });

    _removeLoadingMsg();

    if (!res.ok) {
      const errJson = await res.json().catch(() => ({}));
      const errMsg = res.status === 401
        ? 'API Key가 올바르지 않습니다.'
        : `요청 실패 (${res.status}): ${errJson.error?.message || ''}`;
      _appendErrorMsg(errMsg);
      return;
    }

    const json = await res.json();
    console.log('[chat] API response:', JSON.stringify(json).slice(0, 500));
    const textContent = (json.content || []).filter(b => b.type === 'text').map(b => b.text).join('\n');
    const toolBlocks  = (json.content || []).filter(b => b.type === 'tool_use');

    state.chatMessages.push({
      role: 'assistant',
      content: textContent,
      tools: toolBlocks.map(b => { console.log('[chat] tool call:', b.name, JSON.stringify(b.input)); return { id: b.id, name: b.name, input: b.input, status: 'pending' }; }) || [],
    });
    _trimChatHistory();
    try { saveState(); } catch(se) { console.error('[chat] saveState error:', se); }
    renderChatMessages();

  } catch (err) {
    console.error('[chat] fetch/parse error:', err);
    _removeLoadingMsg();
    _appendErrorMsg('네트워크 오류. 다시 시도해 주세요.');
  } finally {
    btn.disabled = false; btn.style.opacity = '';
  }
}

function _trySwitchTabByName(text) {
  const match = state.meta.members.find(m => text.includes(m.name));
  if (match && state.activeTab !== match.id) {
    switchTab(match.id);
  }
}

function _trimChatHistory() {
  if (!state.chatMessages) return;
  while (state.chatMessages.length > 20) state.chatMessages.splice(0, 2);
}

// ── 렌더링 ──
function renderChatMessages() {
  const container = document.getElementById('chatMessages');
  if (!container) return;
  if (!state.chatMessages) state.chatMessages = [];

  console.log('[chat] rendering', state.chatMessages.length, 'messages');
  const rendered = state.chatMessages.map((msg, idx) => {
    try {
      if (msg.role === 'user') {
        return `<div class="chat-msg user">${esc(msg.content || '')}</div>`;
      }
      let html = '';
      if (msg.content) {
        html += `<div class="chat-msg assistant">${esc(msg.content).replace(/\n/g, '<br>')}</div>`;
      }
      (msg.tools || []).forEach((tool, ti) => {
        try {
          html += _renderToolCard(idx, ti, tool);
        } catch(e) {
          console.error('[chat] _renderToolCard error:', e, tool);
          html += `<div class="chat-tool-card" style="color:red">렌더링 오류: ${e.message}</div>`;
        }
      });
      return html;
    } catch(e) {
      console.error('[chat] renderChatMessages msg error:', e, msg);
      return '';
    }
  });
  console.log('[chat] rendered html length:', rendered.join('').length, '| last item:', rendered[rendered.length-1]?.slice(0,100));
  container.innerHTML = rendered.join('');
  const lastEl = container.lastElementChild;
  if (lastEl) lastEl.scrollIntoView({ block: 'end', behavior: 'auto' });
  setTimeout(() => {
    const last2 = container.lastElementChild;
    if (last2) last2.scrollIntoView({ block: 'end', behavior: 'auto' });
  }, 80);
}

function _renderToolCard(msgIdx, toolIdx, tool) {
  const desc = _describeToolUse(tool.name, tool.input);
  const descHtml = `<div class="chat-tool-desc">${esc(desc).replace(/\n/g, '<br>')}</div>`;
  if (tool.status === 'applied') {
    return `<div class="chat-tool-card applied">
      <div class="chat-tool-header">✓ 적용됨</div>
      ${descHtml}
    </div>`;
  }
  if (tool.status === 'cancelled') {
    return `<div class="chat-tool-card cancelled">
      <div class="chat-tool-header">✕ 취소됨</div>
      ${descHtml}
    </div>`;
  }
  return `<div class="chat-tool-card">
    <div class="chat-tool-header">💡 AI 제안</div>
    ${descHtml}
    <div class="chat-tool-actions">
      <button class="chat-tool-apply-btn" onclick="applyTool(${msgIdx},${toolIdx})">적용</button>
      <button class="chat-tool-cancel-btn" onclick="cancelTool(${msgIdx},${toolIdx})">취소</button>
    </div>
  </div>`;
}

function _describeToolUse(name, inp) {
  inp = Object.assign({}, inp, { memberId: _resolveMemberId(inp.memberId) });
  const mname = (getMember(inp.memberId) || {}).name || inp.memberId;
  const mdata = state.members[inp.memberId];
  const task  = mdata ? mdata.tasks.find(t => t.id === inp.taskId) : null;
  const tname = task ? (task.kpiProduct || '(과제)') : inp.taskId;
  switch (name) {
    case 'add_activity': {
      const wt = inp.weekType === 'current' ? '금주활동' : '차주계획';
      return `${mname} › ${tname} › ${wt} 추가:\n"${inp.text}"${inp.progress != null ? ` (${inp.progress}%)` : ''}`;
    }
    case 'update_activity': {
      const wt = inp.weekType === 'current' ? '금주활동' : '차주계획';
      const parts = [];
      if (inp.text) parts.push(`내용: "${inp.text}"`);
      if (inp.progress != null) parts.push(`진척: ${inp.progress}%`);
      return `${mname} › ${tname} › ${wt} 수정:\n${parts.join(', ')}`;
    }
    case 'update_task_meta': {
      const ch = [];
      if (inp.kpiProduct) ch.push(`KPI: "${inp.kpiProduct}"`);
      if (inp.deadline) ch.push(`마감: ${inp.deadline}`);
      if (inp.overallProgress != null) ch.push(`진척: ${inp.overallProgress}%`);
      return `${mname} › ${tname} › 메타 수정:\n${ch.join(', ')}`;
    }
    case 'add_issue':     return `${mname} › ${tname} › 이슈 추가:\n"${inp.text}"`;
    case 'add_operation': {
      const wt = inp.weekType === 'current' ? '금주' : '차주';
      return `${mname} › 운영/요청 추가 [${wt}]:\n"${inp.text}"`;
    }
    case 'add_detail': {
      const wt2 = inp.weekType === 'current' ? '금주활동' : '차주계획';
      return `${mname} › ${tname} › ${wt2} 상세내용 추가:\n"${inp.text}"`;
    }
    case 'add_deployment': {
      const parts = [];
      if (inp.round)        parts.push(inp.round);
      if (inp.deployDate)   parts.push(`~${inp.deployDate}`);
      if (inp.progressText) parts.push(inp.progressText);
      return `${mname} › 배포 추가:\n${inp.product}${parts.length ? ' ' + parts.join(' ') : ''}`;
    }
    case 'update_operation': {
      const op = mdata ? (mdata.operations || []).find(o => o.id === inp.operationId) : null;
      const orig = op ? `"${op.text}"` : inp.operationId;
      return `${mname} › 운영/요청 수정:\n${orig} → "${inp.text}"`;
    }
    case 'update_deployment': {
      const dep = mdata ? (mdata.deployments || []).find(d => d.id === inp.deploymentId) : null;
      const dname = dep ? (dep.product || '(배포)') : inp.deploymentId;
      const parts = [];
      if (inp.product)   parts.push(`제품: "${inp.product}"`);
      if (inp.round)     parts.push(`차수: ${inp.round}`);
      if (inp.deployDate) parts.push(`기한: ${inp.deployDate}`);
      if (inp.progressText) parts.push(`진척: "${inp.progressText}"`);
      if (inp.featureCount != null) parts.push(`기능: ${inp.featureCount}건`);
      if (inp.bugCount    != null) parts.push(`오류: ${inp.bugCount}건`);
      if (inp.issues)    parts.push(`이슈: "${inp.issues}"`);
      return `${mname} › 배포 수정 [${dname}]:\n${parts.join(', ')}`;
    }
    case 'delete_activity': {
      const wt = inp.weekType === 'current' ? '금주활동' : '차주계획';
      const task2 = mdata ? mdata.tasks.find(t => t.id === inp.taskId) : null;
      const arr2 = task2 ? (inp.weekType === 'current' ? task2.currentWeekItems : task2.nextWeekItems) : [];
      const item2 = arr2.find(i => i.id === inp.itemId);
      return `${mname} › ${tname} › ${wt} 삭제:\n"${item2 ? item2.text : inp.itemId}"`;
    }
    case 'delete_issue': {
      const task3 = mdata ? mdata.tasks.find(t => t.id === inp.taskId) : null;
      const iss = task3 ? (task3.issues || []).find(i => i.id === inp.issueId) : null;
      return `${mname} › ${tname} › 이슈 삭제:\n"${iss ? iss.text : inp.issueId}"`;
    }
    case 'delete_operation': {
      const op2 = mdata ? (mdata.operations || []).find(o => o.id === inp.operationId) : null;
      return `${mname} › 운영/요청 삭제:\n"${op2 ? op2.text : inp.operationId}"`;
    }
    case 'delete_deployment': {
      const dep2 = mdata ? (mdata.deployments || []).find(d => d.id === inp.deploymentId) : null;
      return `${mname} › 배포 삭제:\n"${dep2 ? dep2.product : inp.deploymentId}"`;
    }
    case 'add_task': {
      const parts = [];
      if (inp.deadline) parts.push(`마감: ${inp.deadline}`);
      if (inp.overallProgress != null) parts.push(`진척: ${inp.overallProgress}%`);
      return `${mname} › 과제 추가:\n"${inp.kpiProduct}"${parts.length ? ' ' + parts.join(' ') : ''}`;
    }
    case 'delete_task': {
      const toDelTask = mdata ? (mdata.tasks.find(t => t.id === inp.taskId) || (inp.kpiProduct ? mdata.tasks.find(t => t.kpiProduct === inp.kpiProduct) : null)) : null;
      const delName = toDelTask ? (toDelTask.kpiProduct || inp.taskId) : (inp.kpiProduct || inp.taskId);
      return `${mname} › 과제 삭제:\n"${delName}"`;
    }
    case 'delete_detail': {
      const wt3 = inp.weekType === 'current' ? '금주활동' : '차주계획';
      const task5 = mdata ? mdata.tasks.find(t => t.id === inp.taskId) : null;
      const arr5 = task5 ? (inp.weekType === 'current' ? task5.currentWeekItems : task5.nextWeekItems) : [];
      const item5 = (arr5 || []).find(i => i.id === inp.itemId);
      const detail5 = item5 ? (item5.details || []).find(d => d.id === inp.detailId) : null;
      return `${mname} › ${tname} › ${wt3} 상세내용 삭제:\n"${detail5 ? detail5.text : inp.detailId}"`;
    }
    case 'update_detail': {
      const wt4 = inp.weekType === 'current' ? '금주활동' : '차주계획';
      return `${mname} › ${tname} › ${wt4} 상세내용 수정:\n"${inp.text}"`;
    }
    default: return JSON.stringify(inp);
  }
}

function applyTool(msgIdx, toolIdx) {
  console.log('[chat] applyTool called:', msgIdx, toolIdx);
  const msg = (state.chatMessages || [])[msgIdx];
  if (!msg || !msg.tools) { console.warn('[chat] applyTool: msg or tools not found', msgIdx, state.chatMessages.length); return; }
  const tool = msg.tools[toolIdx];
  console.log('[chat] applying:', tool.name, JSON.stringify(tool.input));
  const ok = _applyToolUse(tool.name, tool.input);
  console.log('[chat] applyToolUse result:', ok);
  tool.status = ok ? 'applied' : 'error';
  if (ok) {
    const resolvedId = _resolveMemberId(tool.input.memberId);
    const memberName = getMember(resolvedId)?.name || resolvedId;
    const actionLabel = {
      add_task:        '과제 추가',       delete_task:     '과제 삭제',
      update_task_meta:'과제 정보 수정',  add_activity:    '금주활동 추가',
      update_activity: '활동 수정',       delete_activity: '활동 삭제',
      add_detail:      '세부항목 추가',   update_detail:   '세부항목 수정',   delete_detail:  '세부항목 삭제',
      add_issue:       '이슈 추가',       delete_issue:    '이슈 삭제',
      add_operation:   '운영사항 추가',   update_operation:'운영사항 수정',   delete_operation:'운영사항 삭제',
      add_deployment:  '배포 추가',       update_deployment:'배포 수정',      delete_deployment:'배포 삭제',
    }[tool.name] || tool.name;
    pushNotification('ai_edit', resolvedId, memberName, actionLabel);
  } else {
    showToast('⚠ 해당 항목을 찾을 수 없습니다.');
  }
  saveState();
  renderChatMessages();
  renderMain();
}

function cancelTool(msgIdx, toolIdx) {
  const msg = (state.chatMessages || [])[msgIdx];
  if (!msg || !msg.tools) return;
  msg.tools[toolIdx].status = 'cancelled';
  saveState();
  renderChatMessages();
}

function _resolveMemberId(raw) {
  // ID로 직접 찾기
  if (state.members[raw]) return raw;
  // 이름으로 찾기 (AI가 이름을 memberId로 넣는 경우 대비)
  const found = state.meta.members.find(m => m.name === raw || m.id === raw);
  return found ? found.id : raw;
}

function _applyToolUse(name, inp) {
  inp = Object.assign({}, inp, { memberId: _resolveMemberId(inp.memberId) });
  const mdata = state.members[inp.memberId];
  if (!mdata) { console.warn('[chat] memberId not found:', inp.memberId); return false; }
  switch (name) {
    case 'add_activity': {
      const task = mdata.tasks.find(t => t.id === inp.taskId);
      if (!task) return false;
      const arr = inp.weekType === 'current' ? task.currentWeekItems : task.nextWeekItems;
      arr.push({ id: generateId(), text: inp.text, progress: inp.progress ?? '', details: [] });
      return true;
    }
    case 'update_activity': {
      const task = mdata.tasks.find(t => t.id === inp.taskId);
      if (!task) return false;
      const arr = inp.weekType === 'current' ? task.currentWeekItems : task.nextWeekItems;
      // ID 우선, 없으면 originalText fallback
      let item = arr.find(i => i.id === inp.itemId);
      if (!item && inp.originalText) item = arr.find(i => i.text === inp.originalText);
      if (!item) return false;
      if (inp.text     !== undefined) item.text     = inp.text;
      if (inp.progress !== undefined) item.progress = inp.progress;
      return true;
    }
    case 'update_task_meta': {
      const task = mdata.tasks.find(t => t.id === inp.taskId);
      if (!task) return false;
      if (inp.kpiProduct      !== undefined) task.kpiProduct      = inp.kpiProduct;
      if (inp.deadline        !== undefined) task.deadline        = inp.deadline;
      if (inp.overallProgress !== undefined) task.overallProgress = inp.overallProgress;
      return true;
    }
    case 'add_issue': {
      const task = mdata.tasks.find(t => t.id === inp.taskId);
      if (!task) return false;
      task.issues.push({ id: generateId(), text: inp.text });
      return true;
    }
    case 'add_operation':
      mdata.operations.push({ id: generateId(), text: inp.text, weekType: inp.weekType });
      return true;
    case 'add_detail': {
      const task = mdata.tasks.find(t => t.id === inp.taskId);
      if (!task) return false;
      const arr = inp.weekType === 'current' ? task.currentWeekItems : task.nextWeekItems;
      const item = arr.find(i => i.id === inp.itemId);
      if (!item) return false;
      if (!item.details) item.details = [];
      item.details.push({ id: generateId(), text: inp.text });
      return true;
    }
    case 'add_deployment': {
      if (!mdata.deployments) mdata.deployments = [];
      mdata.deployments.push({
        id: generateId(),
        product:      inp.product      || '',
        round:        inp.round        || '',
        deployDate:   inp.deployDate   || '',
        progressText: inp.progressText || '',
        counts:       { feature: inp.featureCount ?? 0, bug: inp.bugCount ?? 0 },
        issues:       inp.issues       || '',
        redmineItems: [],
      });
      return true;
    }
    case 'update_operation': {
      const op = (mdata.operations || []).find(o => o.id === inp.operationId);
      if (!op) return false;
      op.text = inp.text;
      if (inp.weekType !== undefined) op.weekType = inp.weekType;
      return true;
    }
    case 'update_deployment': {
      const dep = (mdata.deployments || []).find(d => d.id === inp.deploymentId);
      if (!dep) return false;
      if (inp.product      !== undefined) dep.product      = inp.product;
      if (inp.round        !== undefined) dep.round        = inp.round;
      if (inp.deployDate   !== undefined) dep.deployDate   = inp.deployDate;
      if (inp.progressText !== undefined) dep.progressText = inp.progressText;
      if (inp.featureCount !== undefined) { if (!dep.counts) dep.counts = {}; dep.counts.feature = inp.featureCount; }
      if (inp.bugCount     !== undefined) { if (!dep.counts) dep.counts = {}; dep.counts.bug     = inp.bugCount; }
      if (inp.issues       !== undefined) dep.issues = inp.issues;
      return true;
    }
    case 'delete_activity': {
      const task = mdata.tasks.find(t => t.id === inp.taskId);
      if (!task) return false;
      const key = inp.weekType === 'current' ? 'currentWeekItems' : 'nextWeekItems';
      const before = (task[key] || []).length;
      // ID 우선, 없으면 itemText fallback
      const toDelAct = (task[key] || []).find(i => i.id === inp.itemId) ||
        (inp.itemText ? (task[key] || []).find(i => i.text === inp.itemText) : null);
      if (!toDelAct) return false;
      task[key] = (task[key] || []).filter(i => i.id !== toDelAct.id);
      return task[key].length < before;
    }
    case 'delete_issue': {
      const task = mdata.tasks.find(t => t.id === inp.taskId);
      if (!task) return false;
      const before = (task.issues || []).length;
      // ID 우선, 없으면 issueText fallback
      const toDelIssue = (task.issues || []).find(i => i.id === inp.issueId) ||
        (inp.issueText ? (task.issues || []).find(i => i.text === inp.issueText) : null);
      if (!toDelIssue) return false;
      task.issues = (task.issues || []).filter(i => i.id !== toDelIssue.id);
      return task.issues.length < before;
    }
    case 'delete_operation': {
      const before = (mdata.operations || []).length;
      mdata.operations = (mdata.operations || []).filter(o => o.id !== inp.operationId);
      return mdata.operations.length < before;
    }
    case 'delete_deployment': {
      const before = (mdata.deployments || []).length;
      // ID 우선, 일치 없으면 product 이름으로 fallback (AI가 ID를 잘못 복사하는 경우 대비)
      let toDeleteDep = (mdata.deployments || []).find(d => d.id === inp.deploymentId);
      if (!toDeleteDep && inp.product) toDeleteDep = (mdata.deployments || []).find(d => d.product === inp.product);
      if (!toDeleteDep) return false;
      mdata.deployments = mdata.deployments.filter(d => d.id !== toDeleteDep.id);
      return mdata.deployments.length < before;
    }
    case 'add_task': {
      mdata.tasks.push({
        id: generateId(),
        kpiProduct:      inp.kpiProduct      || '',
        division:        inp.division        || '',
        deadline:        inp.deadline        || '',
        overallProgress: inp.overallProgress ?? 0,
        currentWeekItems: [],
        nextWeekItems:    [],
        issues:           [],
      });
      return true;
    }
    case 'delete_task': {
      const before = mdata.tasks.length;
      // ID 우선, 일치 없으면 kpiProduct 이름으로 fallback
      let toDelTask = mdata.tasks.find(t => t.id === inp.taskId);
      if (!toDelTask && inp.kpiProduct) toDelTask = mdata.tasks.find(t => t.kpiProduct === inp.kpiProduct);
      if (!toDelTask) return false;
      mdata.tasks = mdata.tasks.filter(t => t.id !== toDelTask.id);
      return mdata.tasks.length < before;
    }
    case 'delete_detail': {
      const task = mdata.tasks.find(t => t.id === inp.taskId);
      if (!task) return false;
      const arr = inp.weekType === 'current' ? task.currentWeekItems : task.nextWeekItems;
      const item = (arr || []).find(i => i.id === inp.itemId);
      if (!item || !item.details) return false;
      const before = item.details.length;
      // ID 우선, 없으면 originalText로 fallback
      const toDelId = (item.details.find(d => d.id === inp.detailId) || (inp.originalText ? item.details.find(d => d.text === inp.originalText) : null) || {}).id;
      if (!toDelId) return false;
      item.details = item.details.filter(d => d.id !== toDelId);
      return item.details.length < before;
    }
    case 'update_detail': {
      const task = mdata.tasks.find(t => t.id === inp.taskId);
      if (!task) return false;
      const arr = inp.weekType === 'current' ? task.currentWeekItems : task.nextWeekItems;
      const item = (arr || []).find(i => i.id === inp.itemId);
      if (!item || !item.details) return false;
      // ID 우선, 없으면 originalText로 fallback
      const detail = item.details.find(d => d.id === inp.detailId) || (inp.originalText ? item.details.find(d => d.text === inp.originalText) : null);
      if (!detail) return false;
      detail.text = inp.text;
      return true;
    }
    default: return false;
  }
}

function _appendLoadingMsg() {
  const c = document.getElementById('chatMessages');
  if (!c) return;
  const el = document.createElement('div');
  el.className = 'chat-msg chat-loading';
  el.id = 'chatLoadingMsg';
  el.textContent = '응답 대기 중...';
  c.appendChild(el);
  c.scrollTop = c.scrollHeight;
}
function _removeLoadingMsg() {
  const el = document.getElementById('chatLoadingMsg');
  if (el) el.remove();
}
function _appendErrorMsg(msg) {
  const c = document.getElementById('chatMessages');
  if (!c) return;
  const el = document.createElement('div');
  el.className = 'chat-msg error';
  el.textContent = '⚠ ' + msg;
  c.appendChild(el);
  c.scrollTop = c.scrollHeight;
}

// ============================================================
// INIT
// ============================================================
function init() {
  loadState();
  loadNotifications();
  renderSidebar();
  renderMain();

  const lastVisit = parseInt(localStorage.getItem(LAST_VISIT_KEY) || '0', 10);
  const elapsed = Date.now() - lastVisit;
  if (!state.meta.teamName || elapsed > LANDING_TIMEOUT_MS) {
    showLanding();
  } else {
    localStorage.setItem(LAST_VISIT_KEY, String(Date.now()));
  }

  // 벨 아이콘 마운트
  const bellMount = document.getElementById('notifBellMount');
  if (bellMount) bellMount.innerHTML = renderNotificationBell();

  // 패널 외부 클릭 시 닫기 (중복 등록 방지)
  if (!window._notifClickListenerAdded) {
    document.addEventListener('click', (e) => {
      if (_notifOpen && !e.target.closest('.notif-wrap') && !e.target.closest('#notifPanel')) {
        closeNotifPanel();
      }
    });
    window._notifClickListenerAdded = true;
  }
}

init();
</script>
